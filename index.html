<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clase 2 · Fracciones y Divisiones 🚀</title>
<style>
/* ==========================================================================
   VARIABLES GLOBALES DE DISEÑO
   ========================================================================== */
:root{
  --morado:#5B3A9E;
  --morado-osc:#3D2570;
  --amarillo:#FFD23F;
  --verde:#3CCB7F;
  --rosa:#FF6FA5;
  --azul:#3EC6FF;
  --naranja:#FF8C42;
  --crema:#FFF8EC;
  --texto:#2E1A47;
  --rojo:#FF5A5F;
  --sombra: 0 8px 0 rgba(0,0,0,0.15);
  --font: 'Baloo 2','Comic Sans MS','Segoe UI Rounded','Trebuchet MS',sans-serif;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;height:100%;
  font-family:var(--font);
  background:linear-gradient(160deg,#7A4FD1 0%,#5B3A9E 45%,#3D2570 100%);
  color:var(--texto);
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
body::before{
  /* estrellas de fondo fijas */
  content:"";
  position:fixed;inset:0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, #ffffffaa 50%, transparent 51%),
    radial-gradient(2px 2px at 80% 10%, #ffffff88 50%, transparent 51%),
    radial-gradient(3px 3px at 60% 70%, #ffffff66 50%, transparent 51%),
    radial-gradient(2px 2px at 30% 80%, #ffffff99 50%, transparent 51%),
    radial-gradient(2px 2px at 90% 60%, #ffffff77 50%, transparent 51%),
    radial-gradient(2px 2px at 45% 40%, #ffffff55 50%, transparent 51%);
  background-size:100% 100%;
  animation: twinkle 4s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:0;
}
@keyframes twinkle{ from{opacity:.6;} to{opacity:1;} }

button{font-family:var(--font);cursor:pointer;}
h1,h2,h3,p{margin:0;}

#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* ==========================================================================
   BARRA SUPERIOR
   ========================================================================== */
#topbar{
  display:none;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  background:rgba(0,0,0,0.18);
  backdrop-filter:blur(4px);
}
#topbar.show{display:flex;}
.btn-back{
  background:var(--crema);
  border:none;border-radius:16px;
  width:52px;height:52px;font-size:26px;
  box-shadow:var(--sombra);
  flex-shrink:0;
  transition:transform .1s;
}
.btn-back:active{transform:translateY(6px);box-shadow:none;}
.progress-outer{
  flex:1;background:rgba(255,255,255,0.25);
  border-radius:20px;height:22px;overflow:hidden;
  border:2px solid rgba(255,255,255,0.4);
}
.progress-inner{
  height:100%;
  background:linear-gradient(90deg,var(--verde),var(--azul));
  width:0%;
  border-radius:20px;
  transition:width .4s ease;
}
#hud-stats{
  display:flex;gap:10px;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;
  white-space:nowrap;
}
#hud-stats span{background:rgba(255,255,255,0.18);padding:6px 10px;border-radius:12px;}

/* ==========================================================================
   PANTALLAS
   ========================================================================== */
.screen{display:none;flex:1;flex-direction:column;align-items:center;padding:20px;animation:fadeIn .35s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ---------- HOME ---------- */
#screen-home{justify-content:center;text-align:center;gap:26px;}
.home-title{
  color:#fff;font-size:56px;font-weight:800;
  text-shadow:0 4px 0 rgba(0,0,0,0.25);
  letter-spacing:1px;
}
.home-sub{color:var(--amarillo);font-size:22px;font-weight:700;margin-top:-10px;}
.home-buttons{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.big-btn{
  border:none;border-radius:28px;
  padding:34px 42px;
  font-size:30px;font-weight:800;
  color:#fff;min-width:230px;
  box-shadow:0 10px 0 rgba(0,0,0,0.25);
  transition:transform .12s, box-shadow .12s;
  animation:floaty 3s ease-in-out infinite;
}
.big-btn:active{transform:translateY(10px);box-shadow:0 0 0 rgba(0,0,0,0.25);}
.big-btn.clase{background:linear-gradient(145deg,var(--azul),#2196c9);}
.big-btn.practica{background:linear-gradient(145deg,var(--naranja),#e6672a);animation-delay:.4s;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ---------- MASCOTA ---------- */
#mascot-wrap{
  position:fixed;bottom:14px;left:14px;
  display:flex;align-items:flex-end;gap:10px;
  z-index:50;pointer-events:none;
}
#mascot{
  font-size:70px;
  animation:bounce 2.2s ease-in-out infinite;
  filter:drop-shadow(0 6px 4px rgba(0,0,0,0.35));
}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-14px) rotate(4deg);}}
#speech{
  background:var(--crema);
  border-radius:18px 18px 18px 4px;
  padding:10px 16px;
  font-weight:700;font-size:16px;
  max-width:220px;
  box-shadow:var(--sombra);
  opacity:0;transform:scale(0.7);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
#speech.show{opacity:1;transform:scale(1);}

/* ---------- TARJETAS GENERALES ---------- */
.card{
  background:var(--crema);
  border-radius:26px;
  padding:26px;
  box-shadow:var(--sombra);
  width:100%;max-width:640px;
}
.pill{
  display:inline-block;background:var(--amarillo);color:var(--morado-osc);
  padding:6px 16px;border-radius:20px;font-weight:800;font-size:14px;
  margin-bottom:8px;
}

/* ---------- SLIDES ---------- */
#screen-slides{gap:16px;width:100%;}
.slide-card{
  width:100%;max-width:680px;
  background:var(--crema);
  border-radius:28px;
  padding:30px;
  box-shadow:var(--sombra);
  text-align:center;
  min-height:400px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:14px;
}
.slide-title{font-size:30px;font-weight:800;color:var(--morado);}
.slide-sub{font-size:17px;color:#666;font-weight:600;}
.slide-visual{margin:10px 0;display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;}
.slide-nav{display:flex;gap:16px;margin-top:16px;width:100%;max-width:680px;justify-content:space-between;}
.nav-btn{
  border:none;border-radius:18px;padding:16px 26px;font-size:18px;font-weight:800;color:#fff;
  box-shadow:0 6px 0 rgba(0,0,0,0.2);
  transition:transform .1s;
}
.nav-btn:active{transform:translateY(6px);box-shadow:none;}
.nav-btn.prev{background:#9b8bbf;}
.nav-btn.next{background:var(--verde);}
.nav-btn:disabled{opacity:0.35;pointer-events:none;}
.dots{display:flex;gap:8px;justify-content:center;}
.dot{width:12px;height:12px;border-radius:50%;background:#ddd;}
.dot.active{background:var(--rosa);transform:scale(1.3);}

/* pastel / pie chart */
.pie{width:130px;height:130px;border-radius:50%;box-shadow:inset 0 0 0 4px #fff, 0 4px 10px rgba(0,0,0,0.2);}
.bar-row{display:flex;gap:4px;}
.bar-box{width:34px;height:44px;border-radius:6px;border:2px solid #fff;}
.label-tag{font-size:13px;font-weight:700;color:#fff;background:var(--morado);padding:4px 10px;border-radius:10px;}

/* mini reto dentro de slide */
.mini-reto{background:#eee7fb;border-radius:18px;padding:16px;width:100%;}
.mini-reto-opts{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.mini-opt{
  border:none;border-radius:14px;padding:12px 20px;font-size:16px;font-weight:800;
  background:#fff;box-shadow:0 4px 0 rgba(0,0,0,0.15);color:var(--morado);
}
.mini-feedback{margin-top:10px;font-weight:800;min-height:24px;}

/* ---------- EJERCICIOS / EXAMEN ---------- */
#screen-exercise{gap:18px;width:100%;}
.exercise-header{color:#fff;text-align:center;}
.exercise-header .tema-label{font-size:16px;font-weight:700;opacity:.85;}
.exercise-header .streak{font-size:15px;color:var(--amarillo);font-weight:800;}
.q-card{width:100%;max-width:640px;text-align:center;}
.q-visual{margin:14px 0;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
.q-text{font-size:24px;font-weight:800;color:var(--morado);line-height:1.4;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
@media(max-width:520px){.options{grid-template-columns:1fr;}}
.opt-btn{
  border:none;border-radius:20px;padding:22px 14px;font-size:22px;font-weight:800;
  background:#fff;color:var(--morado);
  box-shadow:0 6px 0 #d8d0ec;
  transition:transform .1s, box-shadow .1s;
  border:3px solid #e6def7;
}
.opt-btn:active{transform:translateY(6px);box-shadow:none;}
.opt-btn.correct{background:var(--verde);color:#fff;border-color:#2aa863;animation:pop .4s;}
.opt-btn.wrong{background:var(--rojo);color:#fff;border-color:#c94044;animation:shake .4s;}
.opt-btn.dim{opacity:.45;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

.feedback-box{
  margin-top:16px;padding:14px 18px;border-radius:16px;font-weight:700;font-size:16px;
  display:none;text-align:left;
}
.feedback-box.show{display:block;animation:fadeIn .3s;}
.feedback-box.ok{background:#d8f7e6;color:#1f7a49;}
.feedback-box.bad{background:#ffe1e2;color:#a13438;}

.btn-siguiente{
  margin-top:16px;border:none;border-radius:18px;padding:16px 30px;font-size:18px;font-weight:800;
  background:var(--amarillo);color:var(--morado-osc);box-shadow:0 6px 0 #c99f1e;
  display:none;
}
.btn-siguiente.show{display:inline-block;}
.btn-siguiente:active{transform:translateY(6px);box-shadow:none;}

/* ---------- INTERSTITIAL / TRANSICIONES ---------- */
.interstitial{justify-content:center;align-items:center;text-align:center;gap:20px;}
.interstitial .emoji-big{font-size:90px;animation:bounce 1.6s ease-in-out infinite;}
.interstitial h2{color:#fff;font-size:32px;}
.interstitial p{color:var(--amarillo);font-size:18px;font-weight:700;}

/* ---------- RESULTADOS ---------- */
#screen-results{justify-content:center;align-items:center;text-align:center;gap:14px;}
.medal{font-size:100px;animation:medalPop .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes medalPop{0%{transform:scale(0) rotate(-30deg);}100%{transform:scale(1) rotate(0);}}
.result-title{color:#fff;font-size:34px;font-weight:800;}
.result-pct{font-size:60px;font-weight:900;color:var(--amarillo);text-shadow:0 3px 0 rgba(0,0,0,.2);}
.result-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.result-stats .stat{background:rgba(255,255,255,.15);color:#fff;padding:10px 16px;border-radius:14px;font-weight:700;min-width:110px;}
.result-msg{color:#fff;font-size:18px;font-weight:700;max-width:500px;}
.btn-replay{
  margin-top:10px;border:none;border-radius:20px;padding:20px 34px;font-size:22px;font-weight:800;
  background:linear-gradient(145deg,var(--verde),#28a866);color:#fff;box-shadow:0 8px 0 rgba(0,0,0,0.25);
}
.btn-replay:active{transform:translateY(8px);box-shadow:none;}

/* ---------- CONFETI ---------- */
#confetti-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:200;}
.confetti-piece{position:absolute;top:-20px;width:10px;height:16px;opacity:0.95;animation-name:confettiFall;animation-timing-function:ease-in;animation-fill-mode:forwards;}
@keyframes confettiFall{
  from{transform:translateY(-10vh) rotate(0deg);}
  to{transform:translateY(110vh) rotate(680deg);}
}
.star-burst{position:absolute;font-size:22px;animation:starBurst .8s ease-out forwards;pointer-events:none;}
@keyframes starBurst{
  0%{transform:translate(0,0) scale(0.3);opacity:1;}
  100%{transform:translate(var(--sx),var(--sy)) scale(1.3);opacity:0;}
}

/* responsive */
@media(max-width:600px){
  .home-title{font-size:38px;}
  .big-btn{font-size:24px;padding:26px 30px;min-width:170px;}
  .q-text{font-size:19px;}
  .slide-title{font-size:24px;}
  #mascot{font-size:52px;}
  #speech{font-size:13px;max-width:150px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- CAPA DE CONFETI -->
  <div id="confetti-layer"></div>

  <!-- BARRA SUPERIOR -->
  <div id="topbar">
    <button class="btn-back" onclick="goHome()">⬅️</button>
    <div class="progress-outer"><div class="progress-inner" id="progress-bar"></div></div>
    <div id="hud-stats"></div>
  </div>

  <main id="main">

    <!-- ============ PANTALLA DE INICIO ============ -->
    <section id="screen-home" class="screen active">
      <h1 class="home-title">✨ Clase 2 ✨</h1>
      <p class="home-sub">🟡 Fracciones &nbsp; · &nbsp; 🟢 Divisiones</p>
      <div class="home-buttons">
        <button class="big-btn clase" onclick="startClase()">📚 Clase</button>
        <button class="big-btn practica" onclick="startPractica()">🎮 Práctica</button>
      </div>
    </section>

    <!-- ============ PANTALLA DE DIAPOSITIVAS ============ -->
    <section id="screen-slides" class="screen">
      <div class="slide-card" id="slide-card"></div>
      <div class="dots" id="slide-dots"></div>
      <div class="slide-nav">
        <button class="nav-btn prev" id="slide-prev" onclick="prevSlide()">⬅️ Anterior</button>
        <button class="nav-btn next" id="slide-next" onclick="nextSlide()">Siguiente ➡️</button>
      </div>
    </section>

    <!-- ============ PANTALLA DE EJERCICIO / EXAMEN ============ -->
    <section id="screen-exercise" class="screen">
      <div class="exercise-header">
        <div class="tema-label" id="exercise-tema-label">FRACCIONES</div>
        <div class="streak" id="exercise-streak">🔥 Racha: 0</div>
      </div>
      <div class="card q-card">
        <div class="pill" id="q-counter">Pregunta 1</div>
        <div class="q-text" id="q-text"></div>
        <div class="q-visual" id="q-visual"></div>
        <div class="options" id="q-options"></div>
        <div class="feedback-box" id="q-feedback"></div>
        <button class="btn-siguiente" id="btn-siguiente" onclick="nextQuestion()">Siguiente ➡️</button>
      </div>
    </section>

    <!-- ============ INTERSTITIAL (transición entre temas) ============ -->
    <section id="screen-inter" class="screen interstitial">
      <div class="emoji-big" id="inter-emoji">🎉</div>
      <h2 id="inter-title"></h2>
      <p id="inter-sub"></p>
      <button class="nav-btn next" onclick="interContinue()">Continuar ➡️</button>
    </section>

    <!-- ============ PANTALLA DE RESULTADOS ============ -->
    <section id="screen-results" class="screen">
      <div class="medal" id="result-medal">🥇</div>
      <div class="result-title" id="result-title">¡Resultados!</div>
      <div class="result-pct" id="result-pct">0%</div>
      <div class="result-stats" id="result-stats"></div>
      <p class="result-msg" id="result-msg"></p>
      <button class="btn-replay" onclick="goHome()">🔄 Volver a jugar</button>
    </section>

  </main>

  <!-- MASCOTA -->
  <div id="mascot-wrap">
    <div id="speech"></div>
    <div id="mascot">🦉</div>
  </div>

</div>

<script>
/* ============================================================================
   CLASE 2 — FRACCIONES Y DIVISIONES
   Aplicación educativa 100% offline (HTML + CSS + JS puro)
   Organización del script:
     1. Utilidades generales (aleatorios, mezcla, confeti, estrellas)
     2. Sonidos generados con Web Audio API
     3. Mascota y globos de diálogo
     4. Navegación entre pantallas
     5. Contenido de diapositivas (Fracciones y Divisiones)
     6. Generadores de ejercicios (Fracciones y Divisiones)
     7. Motor de ejercicios / examen
     8. Flujo de "Clase" y flujo de "Práctica"
     9. Pantalla de resultados
   ========================================================================== */

/* ---------------------------------------------------------------------------
   1. UTILIDADES GENERALES
--------------------------------------------------------------------------- */
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[rnd(0,arr.length-1)]; }
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=rnd(0,i); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function gcd(a,b){ return b===0?a:gcd(b,a%b); }

const COLORS_CONFETTI=['#FF6FA5','#FFD23F','#3CCB7F','#3EC6FF','#FF8C42','#B48CF2'];

function launchConfetti(n){
  n = n||40;
  const layer=document.getElementById('confetti-layer');
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left = rnd(0,100)+'vw';
    p.style.background = pick(COLORS_CONFETTI);
    p.style.animationDuration = (rnd(22,38)/10)+'s';
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '3px';
    layer.appendChild(p);
    setTimeout(()=>p.remove(), 4200);
  }
}

function starBurstAt(x,y,count){
  count = count||8;
  const layer=document.getElementById('confetti-layer');
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='star-burst';
    s.textContent = pick(['⭐','✨','🌟']);
    s.style.left = x+'px';
    s.style.top = y+'px';
    const ang = Math.random()*Math.PI*2;
    const dist = rnd(40,110);
    s.style.setProperty('--sx', Math.cos(ang)*dist+'px');
    s.style.setProperty('--sy', Math.sin(ang)*dist+'px');
    layer.appendChild(s);
    setTimeout(()=>s.remove(), 850);
  }
}

/* ---------------------------------------------------------------------------
   2. SONIDOS (Web Audio API — sin archivos externos)
--------------------------------------------------------------------------- */
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function playTone(freq, duration, type, delay, vol){
  ensureAudio();
  type = type||'sine'; delay = delay||0; vol = vol===undefined?0.2:vol;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+duration+0.02);
}
function playClick(){ playTone(520,0.08,'triangle',0,0.15); }
function playCorrect(){
  playTone(523.25,0.14,'sine',0, 0.22);
  playTone(659.25,0.14,'sine',0.1, 0.22);
  playTone(783.99,0.22,'sine',0.2, 0.24);
}
function playWrong(){
  playTone(220,0.22,'sawtooth',0,0.16);
  playTone(160,0.28,'sawtooth',0.12,0.16);
}
function playFanfare(){
  const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((f,i)=>playTone(f,0.3,'square',i*0.15,0.15));
}
function playWhoosh(){ playTone(300,0.15,'sine',0,0.1); playTone(500,0.15,'sine',0.05,0.1); }

/* ---------------------------------------------------------------------------
   3. MASCOTA
--------------------------------------------------------------------------- */
const MSG_BIENVENIDA = ["¡Hola! Soy Numi 🦉","¿Listo para aprender? 🚀","¡Vamos a jugar con números!"];
const MSG_CORRECTO = ["¡Genial! 🎉","¡Excelente! ⭐","¡Lo lograste! 💪","¡Súper bien! 🌟","¡Sigue así, campeón! 🚀","¡Increíble! 🥳"];
const MSG_INCORRECTO = ["¡Casi! Sigamos 💡","No pasa nada, aprendemos 😊","¡Tú puedes! Vamos de nuevo 💪","Revisemos juntos 🔍"];

function mascotSay(text){
  const bubble = document.getElementById('speech');
  bubble.textContent = text;
  bubble.classList.remove('show');
  void bubble.offsetWidth; // reinicia animación
  bubble.classList.add('show');
  clearTimeout(mascotSay._t);
  mascotSay._t = setTimeout(()=>bubble.classList.remove('show'), 3200);
}
mascotSay(pick(MSG_BIENVENIDA));

/* ---------------------------------------------------------------------------
   4. NAVEGACIÓN ENTRE PANTALLAS
--------------------------------------------------------------------------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('topbar').classList.toggle('show', id!=='screen-home');
}
function goHome(){
  playClick();
  showScreen('screen-home');
  document.getElementById('hud-stats').innerHTML='';
  document.getElementById('progress-bar').style.width='0%';
  mascotSay(pick(MSG_BIENVENIDA));
}
function setProgress(pct){
  document.getElementById('progress-bar').style.width = Math.min(100,pct)+'%';
}
function setHud(html){ document.getElementById('hud-stats').innerHTML = html; }

/* ---------------------------------------------------------------------------
   5. CONTENIDO DE DIAPOSITIVAS
--------------------------------------------------------------------------- */
// ---- Fracciones (5 diapositivas) ----
const SLIDES_FRACCIONES = [
{
  title:"¿Qué es una fracción? 🍕",

let slideState = { list:[], index:0, onFinish:null };

function openSlides(list, onFinish){
  slideState = { list, index:0, onFinish };
  showScreen('screen-slides');
  renderSlide();
}
function renderSlide(){
  const s = slideState.list[slideState.index];
  const card = document.getElementById('slide-card');
  card.innerHTML = `
    <div class="pill">Diapositiva ${slideState.index+1} / ${slideState.list.length}</div>
    <h2 class="slide-title">${s.title}</h2>
    <p class="slide-sub">${s.sub}</p>
    <div class="slide-visual">${s.visual}</div>
    ${s.extra||''}
  `;
  // puntos
  const dotsWrap = document.getElementById('slide-dots');
  dotsWrap.innerHTML = slideState.list.map((_,i)=>`<div class="dot ${i===slideState.index?'active':''}"></div>`).join('');
  document.getElementById('slide-prev').disabled = slideState.index===0;
  const last = slideState.index === slideState.list.length-1;
  document.getElementById('slide-next').textContent = last ? '¡Empezar ejercicios! 🚀' : 'Siguiente ➡️';
  setProgress( (slideState.index+1)/slideState.list.length*100 );
}
function nextSlide(){
  playClick();
  if(slideState.index < slideState.list.length-1){
    slideState.index++;
    renderSlide();
  } else {
    slideState.onFinish();
  }
}
function prevSlide(){
  playClick();
  if(slideState.index>0){ slideState.index--; renderSlide(); }
}

// Colores para las visualizaciones de fracciones
const SHADE_COLORS = ['#FF6FA5','#FF8FB8'];
const GRAY_COLORS = ['#E4E4E4','#F2F2F2'];

function makePieHTML(total, shaded, size){
  size = size || 130;
  let stops = [];
  let acc = 0;
  const step = 360/total;
  for(let i=0;i<total;i++){
    const color = i<shaded ? SHADE_COLORS[i%2] : GRAY_COLORS[i%2];
    stops.push(`${color} ${acc}deg ${acc+step}deg`);
    acc += step;
  }
  return `<div class="pie" style="width:${size}px;height:${size}px;background:conic-gradient(${stops.join(',')});"></div>`;
}
function makeBarHTML(total, shaded){
  let boxes = '';
  for(let i=0;i<total;i++){
    const color = i<shaded ? SHADE_COLORS[i%2] : GRAY_COLORS[i%2];
    boxes += `<div class="bar-box" style="background:${color};"></div>`;
  }
  return `<div class="bar-row">${boxes}</div>`;
}

function fractionOptionsFrom(correctStr, denomPool){
  // genera 3 distractores distintos con formato "n/d"
  const opts = new Set([correctStr]);
  let guard=0;
  while(opts.size<4 && guard<50){
    guard++;
    const d = pick(denomPool);
    const n = rnd(1, d-1);
    opts.add(`${n}/${d}`);
  }
  return shuffle([...opts]);
}

// -------- FRACCIONES: generador de una pregunta --------
function genFractionQuestion(usedKeys){
  const types = ['pie','bar','numden','read','compare','equiv','word'];
  let attempt=0;
  while(attempt<40){
    attempt++;
    const type = pick(types);
    let q = null;

    if(type==='pie' || type==='bar'){
      const total = pick([3,4,5,6,8]);
      const shaded = rnd(1, total-1);
      const key = `${type}-${total}-${shaded}`;
      if(usedKeys.has(key)) continue;
      const correct = `${shaded}/${total}`;
      const visual = type==='pie' ? makePieHTML(total,shaded) : makeBarHTML(total,shaded);
      q = {
        key, text:'¿Qué fracción está coloreada? 🎨',
        visualHTML: visual,
        options: fractionOptionsFrom(correct, [3,4,5,6,8]),
        answer: correct,
        explain: `La figura tiene ${total} partes iguales y ${shaded} están coloreadas, por eso es ${correct}.`
      };
    }
    else if(type==='numden'){
      const d = rnd(3,10); const n = rnd(1,d-1);
      const askNum = Math.random()>0.5;
      const key = `numden-${n}-${d}-${askNum}`;
      if(usedKeys.has(key)) continue;
      const correct = askNum? n : d;
      const opts = new Set([correct]);
      while(opts.size<4) opts.add(rnd(1, Math.max(d+3,10)));
      q = {
        key, text:`En la fracción ${n}/${d}, ¿cuál es el ${askNum?'numerador':'denominador'}?`,
        visualHTML:`<div style="font-size:44px;font-weight:900;color:var(--morado);">${n}/${d}</div>`,
        options: shuffle([...opts].map(String)),
        answer:String(correct),
        explain: askNum ? `El numerador es el número de arriba: ${n}.` : `El denominador es el número de abajo: ${d}.`
      };
    }
    else if(type==='read'){
      const table = [[1,2,'un medio'],[1,3,'un tercio'],[1,4,'un cuarto'],[2,3,'dos tercios'],[3,4,'tres cuartos'],[1,5,'un quinto'],[2,5,'dos quintos']];
      const [n,d,word] = pick(table);
      const key = `read-${n}-${d}`;
      if(usedKeys.has(key)) continue;
      const distractWords = table.filter(t=>t[2]!==word).map(t=>t[2]);
      const opts = new Set([word]);
      while(opts.size<4) opts.add(pick(distractWords));
      q = {
        key, text:`¿Cómo se lee la fracción ${n}/${d}?`,
        visualHTML: makePieHTML(d,n,110),
        options: shuffle([...opts]),
        answer: word,
        explain:`${n}/${d} se lee "${word}".`
      };
    }
    else if(type==='compare'){
      const d = pick([4,5,6,8]);
      let a = rnd(1,d-1), b = rnd(1,d-1);
      while(a===b){ b = rnd(1,d-1); }
      const key = `compare-${d}-${a}-${b}`;
      if(usedKeys.has(key)) continue;
      const bigger = a>b ? `${a}/${d}` : `${b}/${d}`;
      q = {
        key, text:`¿Cuál fracción es mayor?`,
        visualHTML:`<div style="display:flex;gap:24px;">${makePieHTML(d,a,100)}${makePieHTML(d,b,100)}</div>`,
        options: shuffle([`${a}/${d}`,`${b}/${d}`, `${d}/${d}`, `1/${d}`].filter((v,i,arr)=>arr.indexOf(v)===i).slice(0,4)),
        answer: bigger,
        explain:`Con el mismo total (${d}), gana la que tiene más partes coloreadas: ${bigger}.`
      };
    }
    else if(type==='equiv'){
      const base = pick([[1,2],[1,3],[1,4],[2,3]]);
      const mult = rnd(2,4);
      const correct = `${base[0]*mult}/${base[1]*mult}`;
      const key = `equiv-${base[0]}-${base[1]}-${mult}`;
      if(usedKeys.has(key)) continue;
      const opts = new Set([correct]);
      while(opts.size<4){
        const fm = rnd(2,5);
        const dd = base[1]*fm + rnd(-1,1);
        const nn = base[0]*fm;
        if(dd>0 && nn>0 && nn!==dd) opts.add(`${nn}/${dd}`);
      }
      q = {
        key, text:`¿Qué fracción es equivalente a ${base[0]}/${base[1]}?`,
        visualHTML: makePieHTML(base[1],base[0],110),
        options: shuffle([...opts]),
        answer: correct,
        explain:`Multiplicando arriba y abajo por ${mult}: ${base[0]}×${mult}/${base[1]}×${mult} = ${correct}.`
      };
    }
    else if(type==='word'){
      const themes = [
        {obj:'pizza',emoji:'🍕'}, {obj:'pastel',emoji:'🎂'}, {obj:'chocolate',emoji:'🍫'}
      ];
      const th = pick(themes);
      const total = pick([4,6,8]);
      const eaten = rnd(1,total-1);
      const key = `word-${th.obj}-${total}-${eaten}`;
      if(usedKeys.has(key)) continue;
      const correct = `${eaten}/${total}`;
      q = {
        key, text:`Tu ${th.obj} ${th.emoji} tiene ${total} partes iguales y te comiste ${eaten}. ¿Qué fracción comiste?`,
        visualHTML: makePieHTML(total,eaten,120),
        options: fractionOptionsFrom(correct,[3,4,5,6,8]),
        answer: correct,
        explain:`Comiste ${eaten} de ${total} partes: ${correct}.`
      };
    }

    if(q){ usedKeys.add(q.key); return q; }
  }
  // fallback (muy improbable)
  const total=4, shaded=rnd(1,3);
  return { key:`fallback-${Date.now()}-${Math.random()}`, text:'¿Qué fracción está coloreada?', visualHTML:makePieHTML(total,shaded), options:fractionOptionsFrom(`${shaded}/${total}`,[3,4,5,6]), answer:`${shaded}/${total}`, explain:'Cuenta las partes coloreadas sobre el total.' };
}

// -------- DIVISIONES: generador de una pregunta --------
function genDivisionQuestion(usedKeys){
  const types = ['basic','word','multrelation','byten','choose'];
  let attempt=0;
  while(attempt<40){
    attempt++;
    const type = pick(types);
    let q=null;

    if(type==='basic'){
      const b = rnd(2,10);
      const c = rnd(2,12);
      const a = b*c;
      const key = `basic-${a}-${b}`;
      if(usedKeys.has(key)) continue;
      const opts = new Set([c]);
      while(opts.size<4) opts.add(Math.max(1,c+rnd(-4,4)));
      q = {
        key, text:`¿Cuánto es ${a} ÷ ${b}?`,
        visualHTML:`<div style="font-size:38px;font-weight:900;color:var(--morado);">${a} ÷ ${b} = ?</div>`,
        options: shuffle([...opts].map(String)),
        answer:String(c),
        explain:`${b} × ${c} = ${a}, entonces ${a} ÷ ${b} = ${c}.`
      };
    }
    else if(type==='word'){
      const themes=[['caramelos','🍬','amigos'],['juguetes','🧸','niños'],['galletas','🍪','amigas'],['lápices','✏️','estudiantes'],['estampas','⭐','álbumes']];
      const [obj,emoji,people] = pick(themes);
      const b = rnd(2,6);
      const c = rnd(2,10);
      const a = b*c;
      const key = `word-${obj}-${a}-${b}`;
      if(usedKeys.has(key)) continue;
      const opts = new Set([c]);
      while(opts.size<4) opts.add(Math.max(1,c+rnd(-3,3)));
      q = {
        key, text:`Tienes ${a} ${obj} ${emoji} y los repartes entre ${b} ${people} por igual. ¿Cuántos recibe cada uno?`,
        visualHTML:`<div style="font-size:30px;">${emoji.repeat(Math.min(a,10))}</div>`,
        options: shuffle([...opts].map(String)),
        answer:String(c),
        explain:`${a} ÷ ${b} = ${c}. Cada ${people.slice(0,-1)} recibe ${c}.`
      };
    }
    else if(type==='multrelation'){
      const b = rnd(2,9); const c = rnd(2,9); const a=b*c;
      const key = `multrel-${a}-${b}-${c}`;
      if(usedKeys.has(key)) continue;
      const opts = new Set([c]);
      while(opts.size<4) opts.add(Math.max(1,c+rnd(-4,4)));
      q = {
        key, text:`Si ${b} × ${c} = ${a}, ¿cuánto es ${a} ÷ ${b}?`,
        visualHTML:`<div style="font-size:30px;font-weight:800;color:var(--morado);">${b} × ${c} = ${a}</div>`,
        options: shuffle([...opts].map(String)),
        answer:String(c),
        explain:`La división deshace la multiplicación: ${a} ÷ ${b} = ${c}.`
      };
    }
    else if(type==='byten'){
      const c = rnd(2,90);
      const a = c*10;
      const key = `byten-${a}`;
      if(usedKeys.has(key)) continue;
      const opts = new Set([c]);
      while(opts.size<4) opts.add(Math.max(1,c+rnd(-8,8)));
      q = {
        key, text:`Truco: ${a} ÷ 10 = ? (¡quita un cero!)`,
        visualHTML:`<div style="font-size:38px;font-weight:900;color:var(--morado);">${a} ÷ 10</div>`,
        options: shuffle([...opts].map(String)),
        answer:String(c),
        explain:`Al dividir entre 10, simplemente quitamos un cero: ${a} ÷ 10 = ${c}.`
      };
    }
    else if(type==='choose'){
      const b = rnd(2,9); const c = rnd(2,9); const a=b*c;
      const key = `choose-${a}-${b}-${c}`;
      if(usedKeys.has(key)) continue;
      const wrongB = Math.max(2,b+pick([-1,1,2]));
      const correctText = `${a} ÷ ${b} = ${c}`;
      const opts = new Set([correctText]);
      opts.add(`${a} ÷ ${wrongB} = ${c}`);
      opts.add(`${a} ÷ ${b} = ${c+1}`);
      opts.add(`${a+1} ÷ ${b} = ${c}`);
      q = {
        key, text:`¿Cuál división es correcta?`,
        visualHTML:`<div style="font-size:20px;">🧮</div>`,
        options: shuffle([...opts]),
        answer: correctText,
        explain:`Comprobamos: ${b} × ${c} = ${a}, así que ${correctText} es correcta.`
      };
    }

    if(q){ usedKeys.add(q.key); return q; }
  }
  const b=2,c=rnd(2,10),a=b*c;
  return { key:`fallback-${Date.now()}-${Math.random()}`, text:`¿Cuánto es ${a} ÷ ${b}?`, visualHTML:'', options:shuffle([String(c),String(c+1),String(c-1),String(c+2)]), answer:String(c), explain:`${b} × ${c} = ${a}.` };
}

  document.getElementById('exercise-streak').textContent = `🔥 Racha: ${exState.streak}`;
  document.getElementById('q-counter').textContent = `Pregunta ${exState.index+1} / ${total}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-visual').innerHTML = q.visualHTML||'';
  const optsWrap = document.getElementById('q-options');
  optsWrap.innerHTML='';
  q.options.forEach(opt=>{
    const b = document.createElement('button');
    b.className='opt-btn';
    b.textContent = opt;
    b.onclick = ()=>checkAnswer(b, opt, q);
    optsWrap.appendChild(b);
  });
  const fb = document.getElementById('q-feedback');
  fb.className='feedback-box'; fb.textContent='';
  document.getElementById('btn-siguiente').classList.remove('show');
  setProgress( (exState.index)/total*100 );
  setHud(`<span>✅ ${exState.correct}</span><span>❌ ${exState.wrong}</span>`);
}

function checkAnswer(btn, chosen, q){
  const optsWrap = document.getElementById('q-options');
  const allBtns = [...optsWrap.querySelectorAll('.opt-btn')];
  allBtns.forEach(b=>b.onclick=null);

  const isCorrect = chosen === q.answer;
  const fb = document.getElementById('q-feedback');

  if(isCorrect){
    btn.classList.add('correct');
    exState.correct++; exState.streak++;
    exState.maxStreak = Math.max(exState.maxStreak, exState.streak);
    playCorrect();
    const r = btn.getBoundingClientRect();
    starBurstAt(r.left+r.width/2, r.top+r.height/2, 10);
    if(exState.streak>0 && exState.streak%5===0) launchConfetti(30);
    fb.classList.add('ok'); fb.classList.add('show');
    fb.textContent = `✅ ¡Correcto! ${q.explain}`;
    mascotSay(pick(MSG_CORRECTO));
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b=>{ if(b.textContent===q.answer) b.classList.add('correct'); });
    exState.wrong++; exState.streak=0;
    playWrong();
    fb.classList.add('bad'); fb.classList.add('show');
    fb.textContent = `❌ No era esa. ${q.explain}`;
    mascotSay(pick(MSG_INCORRECTO));
  }
  allBtns.forEach(b=>{ if(b!==btn && b.textContent!==q.answer) b.classList.add('dim'); });

  document.getElementById('exercise-streak').textContent = `🔥 Racha: ${exState.streak}`;
  setHud(`<span>✅ ${exState.correct}</span><span>❌ ${exState.wrong}</span>`);
  document.getElementById('btn-siguiente').classList.add('show');
}

function nextQuestion(){
  playClick();
  exState.index++;
  if(exState.index < exState.questions.length){
    renderQuestion();
  } else {
    setProgress(100);
    exState.onFinish();
  }
}

/* ---------------------------------------------------------------------------
   8. FLUJO "CLASE"
--------------------------------------------------------------------------- */
function startClase(){
  playClick();
  openSlides(SLIDES_FRACCIONES, ()=>{
    playWhoosh();
    const used = new Set();
    const qs = []; for(let i=0;i<12;i++) qs.push(genFractionQuestion(used));
    startExerciseSet(qs, '🟡 FRACCIONES', 'clase', onFinishFraccionesClase);
  });
}
function onFinishFraccionesClase(){
  showInterstitial('🎉','¡Fracciones completadas!',`Acertaste ${exState.correct} de ${exState.questions.length}. ¡Ahora vamos con Divisiones!`, ()=>{
    openSlides(SLIDES_DIVISIONES, ()=>{
      playWhoosh();
      const used = new Set();
      const qs = []; for(let i=0;i<12;i++) qs.push(genDivisionQuestion(used));
      startExerciseSet(qs, '🟢 DIVISIONES', 'clase', onFinishDivisionesClase);
    });
  });
}
function onFinishDivisionesClase(){
  launchConfetti(60);
  playFanfare();
  mascotSay('¡Clase terminada! 🎓');
  showInterstitial('🏆','¡Clase completada!', `¡Excelente trabajo aprendiendo Fracciones y Divisiones! Cuando quieras, ve a "🎮 Práctica" para poner a prueba lo aprendido.`, ()=>{
    goHome();
  }, true);
}

let interCallback = null;
function showInterstitial(emoji, title, sub, callback, isFinal){
  document.getElementById('inter-emoji').textContent = emoji;
  document.getElementById('inter-title').textContent = title;
  document.getElementById('inter-sub').textContent = sub;
  document.querySelector('#screen-inter .nav-btn').textContent = isFinal ? '🏠 Ir al inicio' : 'Continuar ➡️';
  interCallback = callback;
  showScreen('screen-inter');
  if(!isFinal) launchConfetti(25);
}
function interContinue(){
  playClick();
  if(interCallback) interCallback();
}

/* ---------------------------------------------------------------------------
   9. FLUJO "PRÁCTICA" (examen de 30 preguntas)
--------------------------------------------------------------------------- */
let practicaTimer=null, practicaStart=0;

function startPractica(){
  playClick();
  const usedF = new Set(), usedD = new Set();
  const fracs = []; for(let i=0;i<15;i++) fracs.push({...genFractionQuestion(usedF), tema:'fraccion'});
  const divs  = []; for(let i=0;i<15;i++) divs.push({...genDivisionQuestion(usedD), tema:'division'});
  const all = shuffle([...fracs, ...divs]);

  practicaStart = Date.now();
  startExerciseSet(all, '🏆 EXAMEN MIXTO', 'practica', onFinishPractica);

  // muestra intro breve mediante mascota
  mascotSay('🏆 ¡Hora de demostrar lo aprendido!');
}

function onFinishPractica(){
  const elapsedMs = Date.now() - practicaStart;
  showResults(exState.correct, exState.wrong, exState.questions.length, elapsedMs, exState.maxStreak);
}

/* ---------------------------------------------------------------------------
   10. PANTALLA DE RESULTADOS
--------------------------------------------------------------------------- */
function formatTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const rem = s%60;
  return `${m}m ${rem}s`;
}

function showResults(correct, wrong, total, elapsedMs, maxStreak){
  const pct = Math.round((correct/total)*100);
  let medal, title, msg;
  if(pct>=95){ medal='🥇'; title='¡Medalla de Oro!'; msg='¡Eres un genio de las matemáticas! Dominaste fracciones y divisiones.'; }
  else if(pct>=80){ medal='🥈'; title='¡Medalla de Plata!'; msg='¡Muy buen trabajo! Estás cada vez más cerca de la perfección.'; }
  else if(pct>=60){ medal='🥉'; title='¡Medalla de Bronce!'; msg='¡Buen esfuerzo! Sigue practicando para mejorar aún más.'; }
  else { medal='💪'; title='¡Vamos con todo!'; msg='¡Podemos seguir practicando! Cada intento te hace más fuerte.'; }

  document.getElementById('result-medal').textContent = medal;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-pct').textContent = pct+'%';
  document.getElementById('result-stats').innerHTML = `
    <div class="stat">✅ Aciertos<br>${correct}</div>
    <div class="stat">❌ Errores<br>${wrong}</div>
    <div class="stat">⏱️ Tiempo<br>${formatTime(elapsedMs)}</div>
    <div class="stat">🔥 Mejor racha<br>${maxStreak}</div>
    <div class="stat">⭐ Puntos<br>${correct*10}</div>
  `;
  document.getElementById('result-msg').textContent = msg;
  showScreen('screen-results');
  document.getElementById('topbar').classList.remove('show');

  if(pct>=60){ launchConfetti(80); playFanfare(); }
  else { playTone(300,0.3,'sine',0,0.15); }
  mascotSay(pct>=80 ? '¡Estoy muy orgulloso de ti! 🎉' : '¡Sigamos practicando juntos! 💪');
}
