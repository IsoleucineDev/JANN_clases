<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Potencias ⚡</title>
<style>
  :root{
    --primary:#2D1B69;
    --primary-light:#4A2FA0;
    --secondary:#00B39B;
    --accent:#FFC93C;
    --accent-hot:#FF6B6B;
    --bg:#F4F2FB;
    --card:#FFFFFF;
    --text:#221845;
    --muted:#6C6480;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', Verdana, sans-serif;
    background:linear-gradient(160deg,var(--primary) 0%, #472B94 45%, var(--primary) 100%);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* floating background bolts */
  .bg-bolt{
    position:fixed; font-size:2.5rem; opacity:.12; color:var(--accent);
    animation:float 9s ease-in-out infinite;
    pointer-events:none; z-index:0;
    user-select:none;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0) rotate(-6deg);}
    50%{ transform:translateY(-40px) rotate(6deg);}
  }

  .screen{
    position:relative; z-index:1;
    min-height:100vh;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
  }
  .screen.active{display:flex;}

  /* ---------- START SCREEN ---------- */
  #start .logo{
    font-size:5rem;
    animation:spark 2.2s ease-in-out infinite;
    filter:drop-shadow(0 0 20px rgba(255,201,60,.6));
  }
  @keyframes spark{
    0%,100%{ transform:scale(1) rotate(0deg);}
    50%{ transform:scale(1.12) rotate(-4deg);}
  }
  #start h1{
    color:#fff;
    font-size:clamp(2.4rem, 6vw, 4rem);
    margin-top:.5rem;
    text-align:center;
    letter-spacing:1px;
  }
  #start h1 sup{
    color:var(--accent);
    font-size:.55em;
    margin-left:.15em;
  }
  #start p.tag{
    color:#C9C2EE;
    font-style:italic;
    margin:.6rem 0 2.5rem;
    text-align:center;
    font-size:1.1rem;
  }
  .mode-row{
    display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center;
  }
  .mode-btn{
    all:unset;
    cursor:pointer;
    background:var(--card);
    color:var(--primary);
    padding:1.6rem 2.4rem;
    border-radius:22px;
    font-size:1.3rem;
    font-weight:800;
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    box-shadow:0 10px 0 rgba(0,0,0,.18), 0 15px 25px rgba(0,0,0,.25);
    transition:transform .12s ease, box-shadow .12s ease;
    min-width:200px;
    text-align:center;
  }
  .mode-btn .emoji{font-size:2.4rem;}
  .mode-btn:hover{ transform:translateY(-4px); }
  .mode-btn:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.18), 0 6px 12px rgba(0,0,0,.2); }
  .mode-btn.practice{ background:var(--secondary); color:#fff; }
  .mode-btn.practice small, .mode-btn.class small{ font-weight:500; font-size:.8rem; opacity:.75;}

  /* ---------- CLASES SCREEN ---------- */
  #clases .word{
    color:#fff;
    font-size:clamp(3rem, 12vw, 7rem);
    font-weight:900;
    letter-spacing:2px;
    animation:pulseWord 2.6s ease-in-out infinite;
    text-shadow:0 0 40px rgba(255,201,60,.5);
  }
  @keyframes pulseWord{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.05); }
  }
  .power-orbit{
    position:relative; width:260px; height:260px; margin:2.5rem auto 0;
  }
  .power-orbit .p-item{
    position:absolute; top:50%; left:50%;
    font-weight:800; color:var(--accent); font-size:1.6rem;
    transform-origin:0 0;
    animation:orbit 10s linear infinite;
  }
  .power-orbit .p-item:nth-child(2){ animation-delay:-3.3s; color:var(--secondary);}
  .power-orbit .p-item:nth-child(3){ animation-delay:-6.6s; color:#fff;}
  @keyframes orbit{
    from{ transform:rotate(0deg) translateX(120px) rotate(0deg); }
    to{ transform:rotate(360deg) translateX(120px) rotate(-360deg); }
  }

  .back-btn{
    all:unset; cursor:pointer;
    position:fixed; top:1.2rem; left:1.2rem; z-index:5;
    background:rgba(255,255,255,.12);
    color:#fff; padding:.6rem 1.1rem; border-radius:14px;
    font-weight:700; font-size:.95rem;
    backdrop-filter:blur(4px);
    transition:background .15s;
  }
  .back-btn:hover{ background:rgba(255,255,255,.25); }

  /* ---------- CLASES SLIDESHOW ---------- */
  .clases-shell{ width:100%; max-width:760px; margin:0 auto; padding-top:1.5rem;}
  .slide-dots{ display:flex; justify-content:center; gap:.5rem; margin-bottom:1.2rem;}
  .slide-dots .dot{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.25); transition:all .25s;}
  .slide-dots .dot.active{ background:var(--accent); width:26px; border-radius:6px; }

  .slide-card{
    background:var(--card); border-radius:26px; padding:2.4rem 2rem;
    min-height:400px; box-shadow:0 20px 45px rgba(0,0,0,.3);
    animation:cardIn .35s ease;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  .s-eyebrow{ color:var(--secondary); font-weight:800; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:.4rem;}
  .s-title{ color:var(--primary); font-size:clamp(1.6rem,4.5vw,2.2rem); font-weight:800; margin-bottom:.8rem;}
  .s-sub{ color:var(--muted); font-size:1.05rem; max-width:32rem; margin-bottom:1rem;}

  .slide-nav{ display:flex; justify-content:space-between; margin-top:1.4rem; gap:1rem;}
  .nav-btn{
    all:unset; cursor:pointer; padding:.8rem 1.4rem; border-radius:14px; font-weight:800;
    background:rgba(255,255,255,.12); color:#fff; transition:background .15s, transform .1s;
  }
  .nav-btn:hover{ background:rgba(255,255,255,.22); transform:translateY(-2px);}
  .nav-btn.primary{ background:var(--accent); color:var(--primary); }
  .nav-btn.disabled{ opacity:.35; pointer-events:none; }

  /* slide 2: definition */
  .power-def-card{
    display:flex; align-items:center; justify-content:center; gap:1rem; flex-wrap:wrap;
    background:#EDE9F9; border-radius:18px; padding:1.6rem 1.2rem; margin-top:.5rem; width:100%;
  }
  .pd-base{ font-size:2.4rem; font-weight:800; color:var(--primary); }
  .pd-eq{ font-size:1.6rem; color:var(--muted); font-weight:700;}
  .pd-expand{ font-size:1.7rem; font-weight:800; color:var(--secondary); }
  .pd-note{ font-size:.95rem; color:var(--muted); font-style:italic;}
  .pd-legend{ margin-top:1rem; display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center; color:var(--text); font-size:.95rem;}

  /* slide 3: chips */
  .chip-row{ display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:.5rem;}
  .chip{ background:#EDE9F9; border-radius:16px; padding:1.2rem 1rem; min-width:9rem; }
  .chip.highlight{ background:var(--primary); }
  .chip.highlight .chip-power{ color:var(--accent); }
  .chip.highlight .chip-label{ color:#fff; }
  .chip-power{ font-size:2rem; font-weight:800; color:var(--primary); margin-bottom:.4rem;}
  .chip-label{ font-size:.85rem; font-weight:700; color:var(--text); }

  /* slide 4: solve */
  .solve-expr{ font-size:1.8rem; font-weight:800; color:var(--primary); }
  .steps-row{ display:flex; gap:.8rem; flex-wrap:wrap; justify-content:center; margin-top:1.2rem;}
  .step-chip{ background:#EDE9F9; color:var(--primary); font-weight:800; padding:.9rem 1.2rem; border-radius:14px; font-size:1.05rem;}
  .step-chip.final{ background:var(--secondary); color:#fff; }

  /* slide 5: sign compare */
  .sign-compare{ display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:.8rem;}
  .sign-card{ border-radius:18px; padding:1.4rem 1.6rem; min-width:11rem; }
  .sign-card.ok{ background:var(--secondary); color:#fff; }
  .sign-card.bad{ background:var(--accent); color:var(--primary); }
  .sign-expr{ font-size:1.6rem; font-weight:800; }
  .sign-res{ font-size:1.6rem; font-weight:800; margin:.3rem 0;}
  .sign-note{ font-size:.85rem; font-weight:600; opacity:.9;}

  /* ---------- GUIDED EXERCISES ---------- */
  .guided-shell{ width:100%; max-width:640px; margin:0 auto; padding-top:5rem;}
  .guided-header{ margin-bottom:1rem;}
  .guided-card{
    background:var(--card); border-radius:24px; padding:2.2rem 1.8rem;
    min-height:340px; box-shadow:0 20px 45px rgba(0,0,0,.3);
    animation:cardIn .35s ease;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  .g-eyebrow{ color:var(--secondary); font-weight:800; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:.6rem;}
  .g-prompt{ font-size:clamp(2rem,7vw,2.8rem); font-weight:800; color:var(--primary); margin-bottom:1.2rem;}
  .g-hint{ color:var(--muted); font-size:.95rem; margin-bottom:1.4rem; font-style:italic;}
  .reveal-btn{
    all:unset; cursor:pointer; background:var(--secondary); color:#fff; font-weight:800;
    padding:.9rem 1.8rem; border-radius:14px; font-size:1.05rem;
    box-shadow:0 6px 0 #007568; transition:transform .1s;
  }
  .reveal-btn:hover{ transform:translateY(-2px); }
  .reveal-btn:active{ transform:translateY(3px); box-shadow:0 2px 0 #007568;}
  .g-steps{ width:100%; margin-top:1rem; }
  .g-step{
    background:#EDE9F9; color:var(--primary); font-weight:700; padding:.8rem 1rem; border-radius:12px;
    margin-bottom:.6rem; opacity:0; transform:translateY(8px); animation:stepIn .35s ease forwards;
  }
  @keyframes stepIn{ to{ opacity:1; transform:none; } }
  .g-result{
    margin-top:.8rem; font-size:1.6rem; font-weight:900; color:var(--secondary);
    opacity:0; animation:stepIn .35s ease forwards;
  }
  .g-next-btn{
    all:unset; cursor:pointer; margin-top:1.4rem; background:var(--accent); color:var(--primary);
    font-weight:800; padding:.85rem 1.8rem; border-radius:14px; font-size:1.05rem;
    box-shadow:0 6px 0 #cf9f20; transition:transform .1s;
    opacity:0; animation:stepIn .35s ease forwards; animation-delay:.15s;
  }
  .g-next-btn:hover{ transform:translateY(-2px);}

  .guided-done .trophy{ font-size:4rem; animation:bounce 1.4s ease infinite; margin-bottom:.5rem;}
  .guided-done h3{ color:var(--primary); font-size:1.6rem; margin-bottom:.5rem;}
  .guided-done p{ color:var(--muted); margin-bottom:1.4rem; }
  .guided-done-btns{ display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
  .g-done-btn{
    all:unset; cursor:pointer; padding:.85rem 1.6rem; border-radius:14px; font-weight:800; font-size:1rem;
    transition:transform .1s;
  }
  .g-done-btn:hover{ transform:translateY(-2px);}
  .g-done-btn.solo{ background:var(--secondary); color:#fff; }
  .g-done-btn.home{ background:#EDE9F9; color:var(--primary); }

  /* ---------- PRACTICE SCREEN ---------- */
  #practice{ justify-content:flex-start; padding-top:5rem; width:100%; max-width:720px; margin:0 auto;}
  .quiz-header{
    width:100%; display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1rem; gap:1rem; flex-wrap:wrap;
  }
  .progress-wrap{ flex:1; min-width:180px;}
  .progress-label{ color:#C9C2EE; font-size:.85rem; margin-bottom:.3rem; font-weight:700;}
  .progress-bar{ background:rgba(255,255,255,.15); height:10px; border-radius:6px; overflow:hidden;}
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--secondary),var(--accent)); width:0%; transition:width .4s ease;}

  .timer-ring{ position:relative; width:64px; height:64px; flex-shrink:0;}
  .timer-ring svg{ transform:rotate(-90deg); }
  .timer-ring circle{ fill:none; stroke-width:6; }
  .timer-ring .bg-c{ stroke:rgba(255,255,255,.15); }
  .timer-ring .fg-c{ stroke:var(--secondary); stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .3s; }
  .timer-num{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:1.1rem;
  }

  .streak-chip{
    background:rgba(255,201,60,.15); color:var(--accent); font-weight:800;
    padding:.4rem .8rem; border-radius:12px; font-size:.85rem;
    display:flex; align-items:center; gap:.3rem; white-space:nowrap;
  }

  .quiz-card{
    background:var(--card); border-radius:24px; padding:2.2rem 1.8rem;
    width:100%; box-shadow:0 20px 45px rgba(0,0,0,.3);
    animation:cardIn .35s ease;
  }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(14px) scale(.97);} to{opacity:1; transform:none;} }

  .q-eyebrow{ color:var(--secondary); font-weight:800; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase;}
  .q-text{
    font-size:clamp(1.6rem, 5vw, 2.3rem); font-weight:800; color:var(--primary);
    margin:.6rem 0 1.8rem; text-align:center;
  }
  .q-text sup{ font-size:.55em; color:var(--accent-hot); }

  .options{ display:grid; grid-template-columns:1fr 1fr; gap:.9rem; }
  @media (max-width:480px){ .options{ grid-template-columns:1fr; } }
  .opt-btn{
    all:unset; cursor:pointer; text-align:center;
    background:#EDE9F9; color:var(--primary); font-weight:800; font-size:1.15rem;
    padding:1rem .5rem; border-radius:16px; border:3px solid transparent;
    transition:transform .1s ease, background .15s, border-color .15s;
  }
  .opt-btn:hover{ transform:translateY(-2px); background:#E1DAF7; }
  .opt-btn.correct{ background:var(--secondary); color:#fff; border-color:#00806f; }
  .opt-btn.wrong{ background:var(--accent-hot); color:#fff; border-color:#c23; }
  .opt-btn.disabled{ pointer-events:none; }
  .opt-btn.dim{ opacity:.45; }

  .feedback{
    text-align:center; font-weight:800; margin-top:1.2rem; min-height:1.6rem; font-size:1.05rem;
  }
  .feedback.ok{ color:var(--secondary); }
  .feedback.bad{ color:var(--accent-hot); }

  /* ---------- RESULT SCREEN ---------- */
  #result .trophy{ font-size:5rem; animation:bounce 1.4s ease infinite; }
  @keyframes bounce{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-16px);} }
  #result h2{ color:#fff; font-size:2.2rem; margin:.6rem 0; text-align:center;}
  #result .score-big{ font-size:4rem; font-weight:900; color:var(--accent); text-align:center; }
  #result .score-sub{ color:#C9C2EE; text-align:center; margin-bottom:2rem; }
  .restart-btn{
    all:unset; cursor:pointer; background:var(--accent); color:var(--primary);
    padding:1rem 2.2rem; border-radius:16px; font-weight:800; font-size:1.1rem;
    box-shadow:0 8px 0 #cf9f20;
    transition:transform .12s;
  }
  .restart-btn:hover{ transform:translateY(-3px); }
  .restart-btn:active{ transform:translateY(3px); box-shadow:0 3px 0 #cf9f20;}

  .confetti{
    position:fixed; top:-20px; width:10px; height:16px; z-index:20; pointer-events:none;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(540deg); opacity:.9; }
  }
</style>
</head>
<body>

<!-- floating decorative bolts -->
<div class="bg-bolt" style="top:8%; left:6%;">⚡</div>
<div class="bg-bolt" style="top:70%; left:12%; animation-delay:-3s;">✳</div>
<div class="bg-bolt" style="top:20%; left:85%; animation-delay:-5s;">⚡</div>
<div class="bg-bolt" style="top:80%; left:80%; animation-delay:-1.5s;">✦</div>
<div class="bg-bolt" style="top:45%; left:50%; animation-delay:-7s;">⚡</div>

<!-- START -->
<section id="start" class="screen active">
  <div class="logo">⚡</div>
  <h1>Potencias</h1>
  <p class="tag">Elige a dónde quieres ir</p>
  <div class="mode-row">
    <button class="mode-btn class" onclick="startClases()">
      <span class="emoji">🎓</span>
      Clases
      <small>Ver el tema</small>
    </button>
    <button class="mode-btn practice" onclick="startPractice()">
      <span class="emoji">🎯</span>
      Práctica
      <small>20 ejercicios · 25s cada uno</small>
    </button>
  </div>
</section>

<!-- CLASES: mini slideshow -->
<section id="clases" class="screen">
  <button class="back-btn" onclick="exitClases()">← Volver</button>
  <div class="clases-shell">
    <div class="slide-dots" id="slideDots"></div>
    <div class="slide-card" id="slideCard"></div>
    <div class="slide-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevSlide()">← Anterior</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextSlide()">Siguiente →</button>
    </div>
  </div>
</section>

<!-- GUIDED EXERCISES -->
<section id="guided" class="screen">
  <button class="back-btn" onclick="exitClases()">← Volver</button>
  <div class="guided-shell">
    <div class="guided-header">
      <div class="progress-label" id="guidedLabel">Ejercicio guiado 1 / 5</div>
      <div class="progress-bar"><div class="progress-fill" id="guidedFill"></div></div>
    </div>
    <div class="guided-card" id="guidedCard"></div>
  </div>
</section>

<!-- PRACTICE -->
<section id="practice" class="screen">
  <button class="back-btn" onclick="confirmExit()">← Salir</button>
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">Pregunta 1 / 20</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="timer-ring">
      <svg width="64" height="64">
        <circle class="bg-c" cx="32" cy="32" r="26"></circle>
        <circle class="fg-c" id="timerCircle" cx="32" cy="32" r="26"></circle>
      </svg>
      <div class="timer-num" id="timerNum">25</div>
    </div>
    <div class="streak-chip">🔥 <span id="streakNum">0</span></div>
  </div>

  <div class="quiz-card">
    <div class="q-eyebrow" id="qDifficulty">Nivel fácil</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</section>

<!-- RESULT -->
<section id="result" class="screen">
  <div class="trophy" id="trophyEmoji">🏆</div>
  <h2 id="resultTitle">¡Bien hecho!</h2>
  <div class="score-big" id="scoreBig">0 / 20</div>
  <div class="score-sub" id="scoreSub"></div>
  <button class="restart-btn" onclick="startPractice()">Volver a intentar</button>
</section>

<script>
/* ---------------- Data: 20 exercises, easy -> hard ---------------- */
const QUESTIONS = [
  { level:"Nivel fácil", html:"2<sup>2</sup> = ?", options:["4","2","6","8"], correct:0 },
  { level:"Nivel fácil", html:"3<sup>2</sup> = ?", options:["9","6","5","12"], correct:0 },
  { level:"Nivel fácil", html:"4<sup>2</sup> = ?", options:["16","8","12","20"], correct:0 },
  { level:"Nivel fácil", html:"5<sup>2</sup> = ?", options:["25","10","20","15"], correct:0 },
  { level:"Nivel fácil", html:"10<sup>2</sup> = ?", options:["100","20","12","1000"], correct:0 },
  { level:"Nivel fácil", html:"2<sup>3</sup> = ?", options:["8","6","9","12"], correct:0 },
  { level:"Nivel fácil", html:"3<sup>3</sup> = ?", options:["27","9","18","21"], correct:0 },
  { level:"Nivel medio", html:"6<sup>2</sup> = ?", options:["36","12","18","30"], correct:0 },
  { level:"Nivel medio", html:"7<sup>2</sup> = ?", options:["49","14","21","35"], correct:0 },
  { level:"Nivel medio", html:"4<sup>3</sup> = ?", options:["64","12","43","48"], correct:0 },
  { level:"Nivel medio", html:"2<sup>4</sup> = ?", options:["16","8","12","32"], correct:0 },
  { level:"Nivel medio", html:"5<sup>3</sup> = ?", options:["125","15","25","75"], correct:0 },
  { level:"Nivel medio", html:"9<sup>2</sup> = ?", options:["81","18","27","90"], correct:0 },
  { level:"Nivel medio", html:"10<sup>3</sup> = ?", options:["1000","30","100","300"], correct:0 },
  { level:"Nivel difícil", html:"2<sup>5</sup> = ?", options:["32","16","10","64"], correct:0 },
  { level:"Nivel difícil", html:"8<sup>0</sup> = ?", options:["1","0","8","80"], correct:0 },
  { level:"Nivel difícil", html:"12<sup>1</sup> = ?", options:["12","1","0","24"], correct:0 },
  { level:"Nivel difícil", html:"(&minus;3)<sup>2</sup> = ?", options:["9","&minus;9","6","&minus;6"], correct:0 },
  { level:"Nivel difícil", html:"&minus;4<sup>2</sup> = ?", options:["&minus;16","16","&minus;8","8"], correct:0 },
  { level:"Reto final", html:"2<sup>2</sup> &times; 2<sup>3</sup> = 2<sup>?</sup>", options:["5","6","8","4"], correct:0 },
];

/* ---------------- Clases: intro slideshow ---------------- */
const INTRO_SLIDES = [
  `<div class="s-eyebrow">Vamos a aprender esto</div>
   <h2 class="s-title">¿Qué son las potencias?</h2>
   <p class="s-sub">Una forma rápida de escribir una multiplicación en la que el mismo número se repite varias veces.</p>
   <div class="power-orbit">
     <div class="p-item">2³</div>
     <div class="p-item">5²</div>
     <div class="p-item">10⁴</div>
   </div>`,

  `<div class="s-eyebrow">Concepto</div>
   <h2 class="s-title">Las partes de una potencia</h2>
   <div class="power-def-card">
     <span class="pd-base">b<sup>n</sup></span>
     <span class="pd-eq">=</span>
     <span class="pd-expand">b &times; b &times; b &times; ... &times; b</span>
     <span class="pd-note">(n veces)</span>
   </div>
   <div class="pd-legend"><span>🟣 <b>b</b> es la base</span><span>🟢 <b>n</b> es el exponente</span></div>`,

  `<div class="s-eyebrow">Concepto</div>
   <h2 class="s-title">Cómo se leen</h2>
   <p class="s-sub">El exponente nos dice cuántas veces se repite la base.</p>
   <div class="chip-row">
     <div class="chip"><div class="chip-power">4<sup>2</sup></div><div class="chip-label">cuatro al cuadrado</div></div>
     <div class="chip highlight"><div class="chip-power">2<sup>3</sup></div><div class="chip-label">dos al cubo</div></div>
     <div class="chip"><div class="chip-power">7<sup>5</sup></div><div class="chip-label">siete elevado a la cinco</div></div>
   </div>`,

  `<div class="s-eyebrow">Esto se resuelve así</div>
   <h2 class="s-title">Ejemplo: 2<sup>4</sup></h2>
   <div class="solve-expr">2<sup>4</sup> = 2 &times; 2 &times; 2 &times; 2</div>
   <div class="steps-row">
     <div class="step-chip">2 × 2 = 4</div>
     <div class="step-chip">4 × 2 = 8</div>
     <div class="step-chip final">8 × 2 = 16</div>
   </div>`,

  `<div class="s-eyebrow">Cuidado con los signos</div>
   <h2 class="s-title">El paréntesis importa</h2>
   <div class="sign-compare">
     <div class="sign-card ok">
       <div class="sign-expr">(&minus;3)<sup>2</sup></div>
       <div class="sign-res">= 9</div>
       <div class="sign-note">el signo entra en la base</div>
     </div>
     <div class="sign-card bad">
       <div class="sign-expr">&minus;3<sup>2</sup></div>
       <div class="sign-res">= &minus;9</div>
       <div class="sign-note">el signo se aplica al final</div>
     </div>
   </div>`,
];

let slideIndex = 0;

function startClases(){
  slideIndex = 0;
  showScreen('clases');
  renderSlide();
}

function renderSlide(){
  document.getElementById('slideCard').innerHTML = INTRO_SLIDES[slideIndex];
  const dotsWrap = document.getElementById('slideDots');
  dotsWrap.innerHTML = INTRO_SLIDES.map((_, i) =>
    `<div class="dot ${i === slideIndex ? 'active' : ''}"></div>`).join('');
  document.getElementById('prevBtn').classList.toggle('disabled', slideIndex === 0);
  document.getElementById('nextBtn').textContent =
    slideIndex === INTRO_SLIDES.length - 1 ? 'Empezar ejercicios guiados →' : 'Siguiente →';
}

function prevSlide(){
  if(slideIndex > 0){ slideIndex--; renderSlide(); }
}

function nextSlide(){
  if(slideIndex < INTRO_SLIDES.length - 1){
    slideIndex++; renderSlide();
  } else {
    startGuided();
  }
}

function exitClases(){
  showScreen('start');
}

/* ---------------- Guided exercises (done together with the student) ---------------- */
const GUIDED = [
  { prompt:"2<sup>3</sup>", hint:"Multiplica el 2 por sí mismo tres veces.", steps:["2 × 2 × 2","4 × 2"], result:"= 8" },
  { prompt:"2<sup>4</sup>", hint:"Multiplica el 2 por sí mismo cuatro veces.", steps:["2 × 2 × 2 × 2","4 × 2 × 2","8 × 2"], result:"= 16" },
  { prompt:"5<sup>0</sup>", hint:"Recuerda la regla del exponente cero.", steps:["Cualquier número (menos 0) elevado a 0 es igual a 1"], result:"= 1" },
  { prompt:"4<sup>2</sup>", hint:"Multiplica el 4 por sí mismo dos veces.", steps:["4 × 4"], result:"= 16" },
  { prompt:"(&minus;3)<sup>2</sup>", hint:"El signo va dentro del paréntesis, así que también se multiplica.", steps:["(&minus;3) × (&minus;3)"], result:"= 9" },
];

let guidedIndex = 0;

function startGuided(){
  guidedIndex = 0;
  showScreen('guided');
  renderGuided();
}

function renderGuided(){
  const fill = document.getElementById('guidedFill');
  const label = document.getElementById('guidedLabel');
  const card = document.getElementById('guidedCard');

  if(guidedIndex >= GUIDED.length){
    fill.style.width = '100%';
    label.textContent = `Ejercicios guiados completos`;
    card.className = 'guided-card guided-done';
    card.innerHTML = `
      <div class="trophy">🌟</div>
      <h3>¡Terminamos los ejercicios guiados!</h3>
      <p>Ahora el alumno puede intentarlo por su cuenta en la práctica cronometrada.</p>
      <div class="guided-done-btns">
        <button class="g-done-btn solo" onclick="startPractice()">Ir a práctica 🎯</button>
        <button class="g-done-btn home" onclick="showScreen('start')">Volver al inicio</button>
      </div>`;
    return;
  }

  card.className = 'guided-card';
  fill.style.width = `${(guidedIndex/GUIDED.length)*100}%`;
  label.textContent = `Ejercicio guiado ${guidedIndex+1} / ${GUIDED.length}`;

  const ex = GUIDED[guidedIndex];
  card.innerHTML = `
    <div class="g-eyebrow">Resuélvanlo juntos</div>
    <div class="g-prompt">${ex.prompt} = ?</div>
    <div class="g-hint">${ex.hint}</div>
    <button class="reveal-btn" id="revealBtn">Ver desarrollo</button>
    <div class="g-steps" id="gSteps"></div>
  `;
  document.getElementById('revealBtn').onclick = revealGuidedSteps;
}

function revealGuidedSteps(){
  const ex = GUIDED[guidedIndex];
  document.getElementById('revealBtn').remove();
  const stepsWrap = document.getElementById('gSteps');
  stepsWrap.innerHTML = ex.steps.map((s, i) =>
    `<div class="g-step" style="animation-delay:${i*0.15}s">${s}</div>`).join('') +
    `<div class="g-result" style="animation-delay:${ex.steps.length*0.15}s">${ex.result}</div>`;

  const nextLabel = guidedIndex === GUIDED.length - 1 ? 'Ver resultados' : 'Siguiente ejercicio →';
  const btn = document.createElement('button');
  btn.className = 'g-next-btn';
  btn.textContent = nextLabel;
  btn.style.animationDelay = `${(ex.steps.length+1)*0.15}s`;
  btn.onclick = () => { guidedIndex++; renderGuided(); };
  stepsWrap.appendChild(btn);
}

let current = 0, score = 0, streak = 0, timer = null, timeLeft = 25;
const TOTAL_TIME = 25;
const RADIUS = 26, CIRC = 2 * Math.PI * RADIUS;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function confirmExit(){
  clearInterval(timer);
  showScreen('start');
}

function startPractice(){
  current = 0; score = 0; streak = 0;
  document.getElementById('streakNum').textContent = '0';
  showScreen('practice');
  loadQuestion();
}

function loadQuestion(){
  clearInterval(timer);
  const q = QUESTIONS[current];
  document.getElementById('qDifficulty').textContent = q.level;
  document.getElementById('qText').innerHTML = q.html;
  document.getElementById('progressLabel').textContent = `Pregunta ${current+1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${(current/QUESTIONS.length)*100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = opt;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  timeLeft = TOTAL_TIME;
  updateTimerDisplay();
  timer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0){
      clearInterval(timer);
      selectAnswer(-1); // timeout
    }
  }, 1000);
}

function updateTimerDisplay(){
  const circle = document.getElementById('timerCircle');
  const offset = CIRC * (1 - timeLeft / TOTAL_TIME);
  circle.style.strokeDasharray = CIRC;
  circle.style.strokeDashoffset = offset;
  document.getElementById('timerNum').textContent = timeLeft;
  circle.style.stroke = timeLeft > 10 ? '#00B39B' : (timeLeft > 5 ? '#FFC93C' : '#FF6B6B');
}

function selectAnswer(idx){
  clearInterval(timer);
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach((b, i) => {
    b.classList.add('disabled');
    if(i === q.correct) b.classList.add('correct');
    if(i === idx && idx !== q.correct) b.classList.add('wrong');
    if(i !== q.correct && i !== idx) b.classList.add('dim');
  });

  const fb = document.getElementById('feedback');
  if(idx === q.correct){
    score++; streak++;
    document.getElementById('streakNum').textContent = streak;
    fb.textContent = '¡Correcto! 🎉';
    fb.className = 'feedback ok';
    burstConfetti();
  } else if(idx === -1){
    streak = 0;
    document.getElementById('streakNum').textContent = streak;
    fb.textContent = '⏰ ¡Se acabó el tiempo!';
    fb.className = 'feedback bad';
  } else {
    streak = 0;
    document.getElementById('streakNum').textContent = streak;
    fb.textContent = 'Casi... ¡sigue intentando!';
    fb.className = 'feedback bad';
  }

  setTimeout(() => {
    current++;
    if(current < QUESTIONS.length){
      loadQuestion();
    } else {
      finishQuiz();
    }
  }, 1400);
}

function finishQuiz(){
  document.getElementById('progressFill').style.width = '100%';
  showScreen('result');
  const pct = Math.round((score / QUESTIONS.length) * 100);
  document.getElementById('scoreBig').textContent = `${score} / ${QUESTIONS.length}`;
  let title, sub, trophy;
  if(pct >= 90){ title = '¡Eres un maestro de las potencias!'; trophy='🏆'; sub='Dominas las potencias como todo un experto.'; }
  else if(pct >= 70){ title = '¡Muy bien hecho!'; trophy='🥈'; sub='Ya casi dominas las potencias por completo.'; }
  else if(pct >= 50){ title = '¡Buen intento!'; trophy='🥉'; sub='Vas por buen camino, repasa un poco más.'; }
  else { title = '¡Sigue practicando!'; trophy='💪'; sub='Revisa la clase y vuelve a intentarlo.'; }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('scoreSub').textContent = sub;
  document.getElementById('trophyEmoji').textContent = trophy;
  if(pct >= 70) burstConfetti(30);
}

function burstConfetti(n){
  const colors = ['#FFC93C','#00B39B','#FF6B6B','#fff','#4A2FA0'];
  const count = n || 14;
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.6 + Math.random()*1.2) + 's';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3200);
  }
}
</script>
