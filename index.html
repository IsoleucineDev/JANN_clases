<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clase 4 · Sucesiones Avanzadas 🚀</title>
<style>
:root{
  --morado:#5B3A9E;
  --morado-osc:#3D2570;
  --amarillo:#FFD23F;
  --verde:#3CCB7F;
  --rosa:#FF6FA5;
  --azul:#3EC6FF;
  --naranja:#FF8C42;
  --crema:#FFF8EC;
  --texto:#2E1A47;
  --rojo:#FF5A5F;
  --sombra: 0 8px 0 rgba(0,0,0,0.15);
  --font: 'Baloo 2','Comic Sans MS','Segoe UI Rounded','Trebuchet MS',sans-serif;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;height:100%;
  font-family:var(--font);
  background:linear-gradient(160deg,#7A4FD1 0%,#5B3A9E 45%,#3D2570 100%);
  color:var(--texto);
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, #ffffffaa 50%, transparent 51%),
    radial-gradient(2px 2px at 80% 10%, #ffffff88 50%, transparent 51%),
    radial-gradient(3px 3px at 60% 70%, #ffffff66 50%, transparent 51%),
    radial-gradient(2px 2px at 30% 80%, #ffffff99 50%, transparent 51%),
    radial-gradient(2px 2px at 90% 60%, #ffffff77 50%, transparent 51%),
    radial-gradient(2px 2px at 45% 40%, #ffffff55 50%, transparent 51%);
  background-size:100% 100%;
  animation: twinkle 4s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:0;
}
@keyframes twinkle{ from{opacity:.6;} to{opacity:1;} }
button{font-family:var(--font);cursor:pointer;}
h1,h2,h3,p{margin:0;}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
#topbar{display:none;align-items:center;gap:14px;padding:14px 18px;background:rgba(0,0,0,0.18);backdrop-filter:blur(4px);}
#topbar.show{display:flex;}
.btn-back{background:var(--crema);border:none;border-radius:16px;width:52px;height:52px;font-size:26px;box-shadow:var(--sombra);flex-shrink:0;transition:transform .1s;}
.btn-back:active{transform:translateY(6px);box-shadow:none;}
.progress-outer{flex:1;background:rgba(255,255,255,0.25);border-radius:20px;height:22px;overflow:hidden;border:2px solid rgba(255,255,255,0.4);}
.progress-inner{height:100%;background:linear-gradient(90deg,var(--verde),var(--azul));width:0%;border-radius:20px;transition:width .4s ease;}
#hud-stats{display:flex;gap:10px;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;white-space:nowrap;}
#hud-stats span{background:rgba(255,255,255,0.18);padding:6px 10px;border-radius:12px;}
.screen{display:none;flex:1;flex-direction:column;align-items:center;padding:20px;animation:fadeIn .35s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
#screen-home{justify-content:center;text-align:center;gap:26px;}
.home-title{color:#fff;font-size:50px;font-weight:800;text-shadow:0 4px 0 rgba(0,0,0,0.25);letter-spacing:1px;}
.home-sub{color:var(--amarillo);font-size:20px;font-weight:700;margin-top:-10px;max-width:600px;}
.home-buttons{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.big-btn{border:none;border-radius:28px;padding:34px 42px;font-size:30px;font-weight:800;color:#fff;min-width:230px;box-shadow:0 10px 0 rgba(0,0,0,0.25);transition:transform .12s, box-shadow .12s;animation:floaty 3s ease-in-out infinite;}
.big-btn:active{transform:translateY(10px);box-shadow:0 0 0 rgba(0,0,0,0.25);}
.big-btn.clase{background:linear-gradient(145deg,var(--azul),#2196c9);}
.big-btn.practica{background:linear-gradient(145deg,var(--naranja),#e6672a);animation-delay:.4s;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
#mascot-wrap{position:fixed;bottom:14px;left:14px;display:flex;align-items:flex-end;gap:10px;z-index:50;pointer-events:none;}
#mascot{font-size:70px;animation:bounce 2.2s ease-in-out infinite;filter:drop-shadow(0 6px 4px rgba(0,0,0,0.35));}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-14px) rotate(4deg);}}
#speech{background:var(--crema);border-radius:18px 18px 18px 4px;padding:10px 16px;font-weight:700;font-size:16px;max-width:220px;box-shadow:var(--sombra);opacity:0;transform:scale(0.7);transition:all .25s cubic-bezier(.34,1.56,.64,1);}
#speech.show{opacity:1;transform:scale(1);}
.card{background:var(--crema);border-radius:26px;padding:26px;box-shadow:var(--sombra);width:100%;max-width:640px;}
.pill{display:inline-block;background:var(--amarillo);color:var(--morado-osc);padding:6px 16px;border-radius:20px;font-weight:800;font-size:14px;margin-bottom:8px;}
#screen-slides{gap:16px;width:100%;}
.slide-card{width:100%;max-width:680px;background:var(--crema);border-radius:28px;padding:30px;box-shadow:var(--sombra);text-align:center;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:14px;}
.slide-title{font-size:28px;font-weight:800;color:var(--morado);}
.slide-sub{font-size:16px;color:#666;font-weight:600;}
.slide-visual{margin:10px 0;display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;}
.slide-nav{display:flex;gap:16px;margin-top:16px;width:100%;max-width:680px;justify-content:space-between;}
.nav-btn{border:none;border-radius:18px;padding:16px 26px;font-size:18px;font-weight:800;color:#fff;box-shadow:0 6px 0 rgba(0,0,0,0.2);transition:transform .1s;}
.nav-btn:active{transform:translateY(6px);box-shadow:none;}
.nav-btn.prev{background:#9b8bbf;}
.nav-btn.next{background:var(--verde);}
.nav-btn:disabled{opacity:0.35;pointer-events:none;}
.dots{display:flex;gap:8px;justify-content:center;}
.dot{width:12px;height:12px;border-radius:50%;background:#ddd;}
.dot.active{background:var(--rosa);transform:scale(1.3);}
.label-tag{font-size:13px;font-weight:700;color:#fff;background:var(--morado);padding:4px 10px;border-radius:10px;}
.seq-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;justify-content:center;}
.seq-term{min-width:58px;height:48px;padding:0 8px;border-radius:10px;background:var(--morado);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0;}
.seq-term.neg{background:var(--rojo);}
.seq-term.blank{background:#eee7fb;color:var(--morado);border:3px dashed var(--morado);}
.seq-arrow{color:#bbb;font-size:18px;flex-shrink:0;}
.resolve-box{background:#eee7fb;border-radius:16px;padding:14px 18px;width:100%;text-align:left;font-size:13.5px;line-height:1.7;color:var(--morado-osc);}
.resolve-box b{color:var(--morado);}
.mini-reto{background:#eee7fb;border-radius:18px;padding:16px;width:100%;}
.mini-reto-opts{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.mini-opt{border:none;border-radius:14px;padding:12px 20px;font-size:16px;font-weight:800;background:#fff;box-shadow:0 4px 0 rgba(0,0,0,0.15);color:var(--morado);}
.mini-feedback{margin-top:10px;font-weight:800;min-height:24px;}
#screen-exercise{gap:18px;width:100%;}
.exercise-header{color:#fff;text-align:center;}
.exercise-header .tema-label{font-size:16px;font-weight:700;opacity:.85;}
.exercise-header .streak{font-size:15px;color:var(--amarillo);font-weight:800;}
.q-card{width:100%;max-width:640px;text-align:center;}
.q-visual{margin:14px 0;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
.q-text{font-size:21px;font-weight:800;color:var(--morado);line-height:1.4;}
.q-tag{display:inline-block;font-size:11.5px;font-weight:800;color:var(--morado);background:#eee7fb;padding:3px 10px;border-radius:10px;margin-bottom:6px;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
@media(max-width:520px){.options{grid-template-columns:1fr;}}
.opt-btn{border:none;border-radius:20px;padding:20px 14px;font-size:19px;font-weight:800;background:#fff;color:var(--morado);box-shadow:0 6px 0 #d8d0ec;transition:transform .1s, box-shadow .1s;border:3px solid #e6def7;}
.opt-btn:active{transform:translateY(6px);box-shadow:none;}
.opt-btn.correct{background:var(--verde);color:#fff;border-color:#2aa863;animation:pop .4s;}
.opt-btn.wrong{background:var(--rojo);color:#fff;border-color:#c94044;animation:shake .4s;}
.opt-btn.dim{opacity:.45;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.feedback-box{margin-top:16px;padding:14px 18px;border-radius:16px;font-weight:700;font-size:15px;display:none;text-align:left;line-height:1.55;}
.feedback-box.show{display:block;animation:fadeIn .3s;}
.feedback-box.ok{background:#d8f7e6;color:#1f7a49;}
.feedback-box.bad{background:#ffe1e2;color:#a13438;}
.btn-siguiente{margin-top:16px;border:none;border-radius:18px;padding:16px 30px;font-size:18px;font-weight:800;background:var(--amarillo);color:var(--morado-osc);box-shadow:0 6px 0 #c99f1e;display:none;}
.btn-siguiente.show{display:inline-block;}
.btn-siguiente:active{transform:translateY(6px);box-shadow:none;}
.interstitial{justify-content:center;align-items:center;text-align:center;gap:20px;}
.interstitial .emoji-big{font-size:90px;animation:bounce 1.6s ease-in-out infinite;}
.interstitial h2{color:#fff;font-size:32px;}
.interstitial p{color:var(--amarillo);font-size:18px;font-weight:700;max-width:520px;}
#screen-results{justify-content:center;align-items:center;text-align:center;gap:14px;}
.medal{font-size:100px;animation:medalPop .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes medalPop{0%{transform:scale(0) rotate(-30deg);}100%{transform:scale(1) rotate(0);}}
.result-title{color:#fff;font-size:34px;font-weight:800;}
.result-pct{font-size:60px;font-weight:900;color:var(--amarillo);text-shadow:0 3px 0 rgba(0,0,0,.2);}
.result-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.result-stats .stat{background:rgba(255,255,255,.15);color:#fff;padding:10px 16px;border-radius:14px;font-weight:700;min-width:110px;}
.result-msg{color:#fff;font-size:18px;font-weight:700;max-width:500px;}
.btn-replay{margin-top:10px;border:none;border-radius:20px;padding:20px 34px;font-size:22px;font-weight:800;background:linear-gradient(145deg,var(--verde),#28a866);color:#fff;box-shadow:0 8px 0 rgba(0,0,0,0.25);}
.btn-replay:active{transform:translateY(8px);box-shadow:none;}
#confetti-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:200;}
.confetti-piece{position:absolute;top:-20px;width:10px;height:16px;opacity:0.95;animation-name:confettiFall;animation-timing-function:ease-in;animation-fill-mode:forwards;}
@keyframes confettiFall{from{transform:translateY(-10vh) rotate(0deg);}to{transform:translateY(110vh) rotate(680deg);}}
.star-burst{position:absolute;font-size:22px;animation:starBurst .8s ease-out forwards;pointer-events:none;}
@keyframes starBurst{0%{transform:translate(0,0) scale(0.3);opacity:1;}100%{transform:translate(var(--sx),var(--sy)) scale(1.3);opacity:0;}}
@media(max-width:600px){
  .home-title{font-size:34px;}
  .big-btn{font-size:24px;padding:26px 30px;min-width:170px;}
  .q-text{font-size:17px;}
  .slide-title{font-size:22px;}
  #mascot{font-size:52px;}
  #speech{font-size:13px;max-width:150px;}
  .seq-term{min-width:46px;height:42px;font-size:14px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="confetti-layer"></div>
  <div id="topbar">
    <button class="btn-back" onclick="goHome()">⬅️</button>
    <div class="progress-outer"><div class="progress-inner" id="progress-bar"></div></div>
    <div id="hud-stats"></div>
  </div>
  <main id="main">
    <section id="screen-home" class="screen active">
      <h1 class="home-title">✨ Clase 4 ✨</h1>
      <p class="home-sub">🔢 Sucesiones avanzadas: números grandes, sumas, restas, multiplicaciones, divisiones, cubos y términos faltantes</p>
      <div class="home-buttons">
        <button class="big-btn clase" onclick="startClase()">📚 Clase</button>
        <button class="big-btn practica" onclick="startPractica()">🎮 Práctica</button>
      </div>
    </section>

    <section id="screen-slides" class="screen">
      <div class="slide-card" id="slide-card"></div>
      <div class="dots" id="slide-dots"></div>
      <div class="slide-nav">
        <button class="nav-btn prev" id="slide-prev" onclick="prevSlide()">⬅️ Anterior</button>
        <button class="nav-btn next" id="slide-next" onclick="nextSlide()">Siguiente ➡️</button>
      </div>
    </section>

    <section id="screen-exercise" class="screen">
      <div class="exercise-header">
        <div class="tema-label" id="exercise-tema-label">SUCESIONES</div>
        <div class="streak" id="exercise-streak">🔥 Racha: 0</div>
      </div>
      <div class="card q-card">
        <div class="pill" id="q-counter">Pregunta 1</div>
        <div class="q-tag" id="q-tag"></div>
        <div class="q-text" id="q-text"></div>
        <div class="q-visual" id="q-visual"></div>
        <div class="options" id="q-options"></div>
        <div class="feedback-box" id="q-feedback"></div>
        <button class="btn-siguiente" id="btn-siguiente" onclick="nextQuestion()">Siguiente ➡️</button>
      </div>
    </section>

    <section id="screen-inter" class="screen interstitial">
      <div class="emoji-big" id="inter-emoji">🎉</div>
      <h2 id="inter-title"></h2>
      <p id="inter-sub"></p>
      <button class="nav-btn next" onclick="interContinue()">Continuar ➡️</button>
    </section>

    <section id="screen-results" class="screen">
      <div class="medal" id="result-medal">🥇</div>
      <div class="result-title" id="result-title">¡Resultados!</div>
      <div class="result-pct" id="result-pct">0%</div>
      <div class="result-stats" id="result-stats"></div>
      <p class="result-msg" id="result-msg"></p>
      <button class="btn-replay" onclick="goHome()">🔄 Volver a jugar</button>
    </section>
  </main>
  <div id="mascot-wrap">
    <div id="speech"></div>
    <div id="mascot">🦉</div>
  </div>
</div>

<script>
/* ============================================================================
   CLASE 4 — SUCESIONES AVANZADAS
   ========================================================================== */

/* 1. UTILIDADES ------------------------------------------------------------ */
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[rnd(0,arr.length-1)]; }
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=rnd(0,i); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
const COLORS_CONFETTI=['#FF6FA5','#FFD23F','#3CCB7F','#3EC6FF','#FF8C42','#B48CF2'];
function launchConfetti(n){
  n = n||40;
  const layer=document.getElementById('confetti-layer');
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left = rnd(0,100)+'vw';
    p.style.background = pick(COLORS_CONFETTI);
    p.style.animationDuration = (rnd(22,38)/10)+'s';
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '3px';
    layer.appendChild(p);
    setTimeout(()=>p.remove(), 4200);
  }
}
function starBurstAt(x,y,count){
  count = count||8;
  const layer=document.getElementById('confetti-layer');
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='star-burst';
    s.textContent = pick(['⭐','✨','🌟']);
    s.style.left = x+'px';
    s.style.top = y+'px';
    const ang = Math.random()*Math.PI*2;
    const dist = rnd(40,110);
    s.style.setProperty('--sx', Math.cos(ang)*dist+'px');
    s.style.setProperty('--sy', Math.sin(ang)*dist+'px');
    layer.appendChild(s);
    setTimeout(()=>s.remove(), 850);
  }
}

/* 2. SONIDOS ---------------------------------------------------------------- */
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function playTone(freq, duration, type, delay, vol){
  ensureAudio();
  type = type||'sine'; delay = delay||0; vol = vol===undefined?0.2:vol;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+duration+0.02);
}
function playClick(){ playTone(520,0.08,'triangle',0,0.15); }
function playCorrect(){
  playTone(523.25,0.14,'sine',0, 0.22);
  playTone(659.25,0.14,'sine',0.1, 0.22);
  playTone(783.99,0.22,'sine',0.2, 0.24);
}
function playWrong(){
  playTone(220,0.22,'sawtooth',0,0.16);
  playTone(160,0.28,'sawtooth',0.12,0.16);
}
function playFanfare(){
  const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((f,i)=>playTone(f,0.3,'square',i*0.15,0.15));
}
function playWhoosh(){ playTone(300,0.15,'sine',0,0.1); playTone(500,0.15,'sine',0.05,0.1); }

/* 3. MASCOTA ------------------------------------------------------------- */
const MSG_BIENVENIDA = ["¡Hola! Soy Numi 🦉","¿Listo para el reto de sucesiones avanzadas? 🚀","¡Vamos a pensar como matemáticos!"];
const MSG_CORRECTO = ["¡Genial! 🎉","¡Excelente! ⭐","¡Lo lograste! 💪","¡Súper bien! 🌟","¡Sigue así, campeón! 🚀","¡Increíble! 🥳"];
const MSG_INCORRECTO = ["¡Casi! Revisemos 💡","No pasa nada, aprendemos 😊","¡Tú puedes! Vamos de nuevo 💪","Repasemos juntos 🔍"];
function mascotSay(text){
  const bubble = document.getElementById('speech');
  bubble.textContent = text;
  bubble.classList.remove('show');
  void bubble.offsetWidth;
  bubble.classList.add('show');
  clearTimeout(mascotSay._t);
  mascotSay._t = setTimeout(()=>bubble.classList.remove('show'), 3200);
}
mascotSay(pick(MSG_BIENVENIDA));

/* 4. NAVEGACIÓN ------------------------------------------------------------ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('topbar').classList.toggle('show', id!=='screen-home');
}
function goHome(){
  playClick();
  showScreen('screen-home');
  document.getElementById('hud-stats').innerHTML='';
  document.getElementById('progress-bar').style.width='0%';
  mascotSay(pick(MSG_BIENVENIDA));
}
function setProgress(pct){ document.getElementById('progress-bar').style.width = Math.min(100,pct)+'%'; }
function setHud(html){ document.getElementById('hud-stats').innerHTML = html; }

/* 5. VISUAL: fila de términos de una sucesión ------------------------------ */
function seqRowHTML(terms, blankIndex){
  let html = '<div class="seq-row">';
  terms.forEach((t,i)=>{
    if(i>0) html += '<div class="seq-arrow">➜</div>';
    if(i===blankIndex) html += '<div class="seq-term blank">?</div>';
    else {
      const isNeg = (typeof t === 'number' && t<0);
      html += `<div class="seq-term ${isNeg?'neg':''}">${t}</div>`;
    }
  });
  html += '</div>';
  return html;
}

/* 5b. Formateo seguro de restas con posibles negativos ---------------------- */
function fmtSub(a,b){
  // muestra a−b, pero si b es negativo lo envuelve en paréntesis: a−(b)
  return b<0 ? `${a}−(${b})` : `${a}−${b}`;
}

/* 6. CONTENIDO DE DIAPOSITIVAS (8) ------------------------------------------ */
const SLIDES_SUCESIONES = [
{
  title:"Repaso rápido 🔁",
  sub:"Recuerda: una sucesión sigue siempre la misma regla",
  visual: seqRowHTML([5,9,13,17,'…']),
  extra:`<div class="resolve-box"><b>Regla:</b> +4 &nbsp;→&nbsp; 9−5=4, 13−9=4, 17−13=4. Se repite siempre.<br>Ahora vamos a complicarlo: números más grandes, restas, multiplicaciones, divisiones y potencias.</div>`
},
{
  title:"Sumas con números grandes ➕",
  sub:"La misma idea, pero con cifras más grandes",
  visual: seqRowHTML([238,261,284,307,'?']),
  extra:`<div class="resolve-box">
    <b>Resolución:</b> 261−238 = 23 &nbsp;·&nbsp; 284−261 = 23 &nbsp;·&nbsp; 307−284 = 23<br>
    <b>Regla:</b> +23 &nbsp;→&nbsp; siguiente término: 307 + 23 = <b>330</b><br>
    <b>Explicación:</b> aunque los números sean grandes, el método es el mismo: resta términos seguidos para hallar la regla y aplícala.
  </div>`
},
{
  title:"Restas con números grandes ➖",
  sub:"¡Cuidado! El resultado puede ser negativo",
  visual: seqRowHTML([180,152,124,96,'?']),

/* 7. GENERADOR DE EJERCICIOS AVANZADOS -------------------------------------- */
function uniqOptions(answer, generator, count){
  // generator() must return a candidate number; ensures 'count' unique options including answer
  const opts = new Set([answer]);
  let guard=0;
  while(opts.size<count && guard<200){
    guard++;
    const cand = generator();
    if(cand!==null && cand!==undefined && !Number.isNaN(cand)) opts.add(cand);
  }
  return shuffle([...opts]);
}

function genSucesionAvanzada(usedKeys){
  const types = ['grande-add','grande-sub','division','multiplicacion','cubos','faltante','alternante','regla-mixta'];
  let attempt=0;
  while(attempt<60){
    attempt++;
    const type = pick(types);
    let q=null;

    if(type==='grande-add'){
      const start = rnd(100,650);
      const step = rnd(11,49);
      const terms = [start, start+step, start+2*step, start+3*step];
      const answer = start+4*step;
      const key = `gadd-${start}-${step}`;
      if(usedKeys.has(key)) continue;
      const options = uniqOptions(answer, ()=>pick([answer+step, answer-step, terms[3], answer+2, answer-2, answer+step*2]), 4);
      q = {
        key, tag:'Suma · números grandes',
        text:'¿Cuál es el siguiente número de la sucesión?',
        visualHTML: seqRowHTML(terms.concat(['?'])),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: ${terms[1]}−${terms[0]}=${step}, ${terms[2]}−${terms[1]}=${step}, ${terms[3]}−${terms[2]}=${step}. La regla es +${step}. Aplicándola: ${terms[3]} + ${step} = ${answer}.`
      };
    }
    else if(type==='grande-sub'){
      const step = rnd(13,45);
      const start = rnd(90,420);
      const terms = [start, start-step, start-2*step, start-3*step];
      const answer = start-4*step;
      const key = `gsub-${start}-${step}`;
      if(usedKeys.has(key)) continue;
      const options = uniqOptions(answer, ()=>pick([answer+step, answer-step, terms[3], answer+3, answer-3]), 4);
      q = {
        key, tag:'Resta · números grandes',
        text:'¿Cuál es el siguiente número de la sucesión?',
        visualHTML: seqRowHTML(terms.concat(['?'])),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: ${fmtSub(terms[0],terms[1])}=${step}, ${fmtSub(terms[1],terms[2])}=${step}, ${fmtSub(terms[2],terms[3])}=${step}. La regla es −${step}. Aplicándola: ${fmtSub(terms[3],step)} = ${answer}.`
      };
    }
    else if(type==='division'){
      const divisor = pick([2,3,4,5]);
      const k = rnd(2,6);
      const start = k * Math.pow(divisor,4);
      if(start>6000) continue;
      const terms = [start, start/divisor, start/Math.pow(divisor,2), start/Math.pow(divisor,3)];
      const answer = start/Math.pow(divisor,4);
      const key = `div-${start}-${divisor}`;
      if(usedKeys.has(key)) continue;
      const options = uniqOptions(answer, ()=>pick([answer*divisor, answer+divisor, Math.max(1,answer-1), answer+1, terms[3]]), 4);
      q = {
        key, tag:'División',
        text:'¿Cuál es el siguiente número de la sucesión?',
        visualHTML: seqRowHTML(terms.concat(['?'])),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: ${terms[0]}÷${divisor}=${terms[1]}, ${terms[1]}÷${divisor}=${terms[2]}, ${terms[2]}÷${divisor}=${terms[3]}. La regla es ÷${divisor}. Aplicándola: ${terms[3]} ÷ ${divisor} = ${answer}.`
      };
    }
    else if(type==='multiplicacion'){
      const ratio = pick([3,4,5,6]);
      const start = rnd(2,7);
      const terms = [start, start*ratio, start*Math.pow(ratio,2), start*Math.pow(ratio,3)];
      const answer = terms[3]*ratio;
      if(answer>12000) continue;
      const key = `mult-${start}-${ratio}`;
      if(usedKeys.has(key)) continue;
      const options = uniqOptions(answer, ()=>pick([answer/ratio|0 || 1, terms[3]+ratio, terms[3], Math.round(answer*0.5), answer+ratio]), 4);
      q = {
        key, tag:'Multiplicación · razón grande',
        text:'¿Cuál es el siguiente número de la sucesión?',
        visualHTML: seqRowHTML(terms.concat(['?'])),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: ${terms[0]}×${ratio}=${terms[1]}, ${terms[1]}×${ratio}=${terms[2]}, ${terms[2]}×${ratio}=${terms[3]}. La regla es ×${ratio}. Aplicándola: ${terms[3]} × ${ratio} = ${answer}.`
      };
    }
    else if(type==='cubos'){
      const n = rnd(3,5);
      const terms = [];
      for(let i=1;i<=n;i++) terms.push(i*i*i);
      const nextN = n+1;
      const answer = nextN*nextN*nextN;
      const key = `cubo-${n}`;
      if(usedKeys.has(key)) continue;
      const options = uniqOptions(answer, ()=>pick([nextN*nextN, answer-nextN*3, answer+nextN, terms[terms.length-1], answer- (nextN-1)]), 4);
      q = {
        key, tag:'Números cúbicos',
        text:'Esta sucesión son números al cubo (n³). ¿Cuál sigue?',
        visualHTML: seqRowHTML(terms.concat(['?'])),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: los términos son 1³, 2³, 3³… hasta ${n}³=${terms[terms.length-1]}. El siguiente es ${nextN}³ = ${nextN}×${nextN}×${nextN} = ${answer}.`
      };
    }
    else if(type==='faltante'){
      const subtype = pick(['add','sub','mult','div']);
      let terms, ruleDesc, step, ratio, divisor;
      if(subtype==='add'){
        step = rnd(6,24); const start = rnd(50,320);
        terms = [start,start+step,start+2*step,start+3*step,start+4*step];
        ruleDesc = `+${step}`;
      } else if(subtype==='sub'){
        step = rnd(6,24); const start = rnd(180,520);
        terms = [start,start-step,start-2*step,start-3*step,start-4*step];
        ruleDesc = `−${step}`;
      } else if(subtype==='mult'){
        ratio = pick([2,3,4]); const start = rnd(2,5);
        terms = [start,start*ratio,start*ratio*ratio,start*ratio*ratio*ratio];
        ruleDesc = `×${ratio}`;
      } else {
        divisor = pick([2,3,4]); const k = rnd(2,5);
        const start = k*Math.pow(divisor,3);
        terms = [start, start/divisor, start/Math.pow(divisor,2), start/Math.pow(divisor,3)];
        ruleDesc = `÷${divisor}`;
      }
      const blankIndex = rnd(0, terms.length-1);
      const answer = terms[blankIndex];
      const key = `falt-${subtype}-${terms.join('-')}-${blankIndex}`;
      if(usedKeys.has(key)) continue;
      const delta = step || ratio || divisor;
      const options = uniqOptions(answer, ()=>pick([answer+delta, answer-delta, answer*2, Math.max(0,answer-1), answer+1]), 4);
      const displayTerms = terms.map((t,i)=> i===blankIndex? '?' : t);
      q = {
        key, tag:'Término faltante',
        text:'¿Qué número falta en la sucesión?',
        visualHTML: seqRowHTML(displayTerms, blankIndex),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: la regla de esta sucesión es ${ruleDesc}. Aplicándola en orden desde un término conocido, el número que falta en esa posición es ${answer}.`
      };
    }
    else if(type==='alternante'){
      const d1 = rnd(4,12);
      const d2 = -rnd(2,9);
      const start = rnd(20,120);
      const t0=start, t1=t0+d1, t2=t1+d2, t3=t2+d1, t4=t3+d2;
      const answer = t4+d1;
      const key = `alt-${start}-${d1}-${d2}`;
      if(usedKeys.has(key)) continue;
      const options = uniqOptions(answer, ()=>pick([t4+d2, answer+d1, answer-d1, t4, answer+2]), 4);
      q = {
        key, tag:'Reto · patrón alterno',
        text:'Esta sucesión alterna dos reglas. ¿Cuál es el siguiente número?',
        visualHTML: seqRowHTML([t0,t1,t2,t3,t4,'?']),
        options: options.map(String),
        answer: String(answer),
        explain:`Resolución: el patrón alterna ${d1>=0?'+'+d1:d1} y ${d2>=0?'+'+d2:d2}: ${t0}→${t1} (${d1>=0?'+'+d1:d1}), ${t1}→${t2} (${d2>=0?'+'+d2:d2}), y así sucesivamente. Como el último paso fue ${d2>=0?'+'+d2:d2}, el siguiente paso es ${d1>=0?'+'+d1:d1}: ${t4} ${d1>=0?'+':''}${d1} = ${answer}.`
      };
    }
    else if(type==='regla-mixta'){
      const kind = pick(['add','sub','mult','div']);
      let terms, ruleText, distractRules;
      if(kind==='add'){ const step=rnd(9,28); const start=rnd(60,400); terms=[start,start+step,start+2*step,start+3*step]; ruleText=`+${step}`; distractRules=[`−${step}`,`×${Math.max(2,Math.round(step/9))}`,`+${step+5}`]; }
      else if(kind==='sub'){ const step=rnd(9,28); const start=rnd(300,700); terms=[start,start-step,start-2*step,start-3*step]; ruleText=`−${step}`; distractRules=[`+${step}`,`÷2`,`−${step-4}`]; }
      else if(kind==='mult'){ const ratio=pick([3,4,5]); const start=rnd(2,6); terms=[start,start*ratio,start*ratio*ratio,start*ratio*ratio*ratio]; ruleText=`×${ratio}`; distractRules=[`+${ratio*10}`,`×${ratio+1}`,`÷${ratio}`]; }
      else { const divisor=pick([2,3,4]); const k=rnd(2,5); const start=k*Math.pow(divisor,3); terms=[start,start/divisor,start/Math.pow(divisor,2),start/Math.pow(divisor,3)]; ruleText=`÷${divisor}`; distractRules=[`×${divisor}`,`−${divisor*10}`,`÷${divisor+1}`]; }
      const key = `rmix-${kind}-${terms.join('-')}`;
      if(usedKeys.has(key)) continue;
      q = {
        key, tag:'Identificar la regla',
        text:'¿Cuál es la regla exacta de esta sucesión?',
        visualHTML: seqRowHTML(terms),
        options: shuffle([ruleText, ...distractRules]),
        answer: ruleText,
        explain:`Resolución: comparando términos seguidos de forma exacta (no solo si sube o baja, sino por cuánto exactamente), la regla que se repite en los tres pasos es ${ruleText}.`
      };
    }

    if(q){ usedKeys.add(q.key); return q; }
  }
  const start=50, step=17;
  const terms=[start,start+step,start+2*step,start+3*step];
  return { key:`fallback-${Date.now()}-${Math.random()}`, tag:'Suma', text:'¿Cuál es el siguiente número?', visualHTML: seqRowHTML(terms.concat(['?'])), options: shuffle([String(start+4*step),String(start+3*step+2),String(start+5*step),String(start+4*step-3)]), answer:String(start+4*step), explain:`La regla es +${step}.` };
}

let exState = { mode:'clase', temaLabel:'SUCESIONES', questions:[], index:0, correct:0, wrong:0, streak:0, maxStreak:0, startTime:0, onFinish:null };

function startExerciseSet(questions, temaLabel, mode, onFinish){
  exState = { mode, temaLabel, questions, index:0, correct:0, wrong:0, streak:0, maxStreak:0, startTime:Date.now(), onFinish };
  showScreen('screen-exercise');
  renderQuestion();
}
function renderQuestion(){
  const total = exState.questions.length;
  const q = exState.questions[exState.index];
  document.getElementById('exercise-tema-label').textContent =
    exState.mode==='practica' ? `🏆 PRÁCTICA · ${exState.temaLabel}` : exState.temaLabel;
  document.getElementById('exercise-streak').textContent = `🔥 Racha: ${exState.streak}`;
  document.getElementById('q-counter').textContent = `Pregunta ${exState.index+1} / ${total}`;
  document.getElementById('q-tag').textContent = q.tag||'';
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-visual').innerHTML = q.visualHTML||'';
  const optsWrap = document.getElementById('q-options');
  optsWrap.innerHTML='';
  q.options.forEach(opt=>{
    const b = document.createElement('button');
    b.className='opt-btn';
    b.textContent = opt;
    b.onclick = ()=>checkAnswer(b, opt, q);
    optsWrap.appendChild(b);
  });
  const fb = document.getElementById('q-feedback');
  fb.className='feedback-box'; fb.textContent='';
  document.getElementById('btn-siguiente').classList.remove('show');
  setProgress( (exState.index)/total*100 );
  setHud(`<span>✅ ${exState.correct}</span><span>❌ ${exState.wrong}</span>`);
}
function checkAnswer(btn, chosen, q){
  const optsWrap = document.getElementById('q-options');
  const allBtns = [...optsWrap.querySelectorAll('.opt-btn')];
  allBtns.forEach(b=>b.onclick=null);
  const isCorrect = chosen === q.answer;
  const fb = document.getElementById('q-feedback');
  if(isCorrect){
    btn.classList.add('correct');
    exState.correct++; exState.streak++;
    exState.maxStreak = Math.max(exState.maxStreak, exState.streak);
    playCorrect();
    const r = btn.getBoundingClientRect();
    starBurstAt(r.left+r.width/2, r.top+r.height/2, 10);
    if(exState.streak>0 && exState.streak%5===0) launchConfetti(30);
    fb.classList.add('ok'); fb.classList.add('show');
    fb.textContent = `✅ ¡Correcto! ${q.explain}`;
    mascotSay(pick(MSG_CORRECTO));
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b=>{ if(b.textContent===q.answer) b.classList.add('correct'); });
    exState.wrong++; exState.streak=0;
    playWrong();
    fb.classList.add('bad'); fb.classList.add('show');
    fb.textContent = `❌ La respuesta correcta era ${q.answer}. ${q.explain}`;
    mascotSay(pick(MSG_INCORRECTO));
  }
  allBtns.forEach(b=>{ if(b!==btn && b.textContent!==q.answer) b.classList.add('dim'); });
  document.getElementById('exercise-streak').textContent = `🔥 Racha: ${exState.streak}`;
  setHud(`<span>✅ ${exState.correct}</span><span>❌ ${exState.wrong}</span>`);
  document.getElementById('btn-siguiente').classList.add('show');
}
function nextQuestion(){
  playClick();
  exState.index++;
  if(exState.index < exState.questions.length){ renderQuestion(); }
  else { setProgress(100); exState.onFinish(); }
}

/* 11. RESULTADOS -------------------------------------------------------------- */
function formatTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const rem = s%60;
  return `${m}m ${rem}s`;
}
function showResults(correct, wrong, total, elapsedMs, maxStreak){
  const pct = Math.round((correct/total)*100);
  let medal, title, msg;
  if(pct>=95){ medal='🥇'; title='¡Medalla de Oro!'; msg='¡Dominas las sucesiones avanzadas por completo!'; }
  else if(pct>=80){ medal='🥈'; title='¡Medalla de Plata!'; msg='¡Muy buen trabajo! Estás cada vez más cerca de la perfección.'; }
  else if(pct>=60){ medal='🥉'; title='¡Medalla de Bronce!'; msg='¡Buen esfuerzo! Sigue practicando para mejorar aún más.'; }
  else { medal='💪'; title='¡Vamos con todo!'; msg='¡Podemos seguir practicando! Cada intento te hace más fuerte.'; }
  document.getElementById('result-medal').textContent = medal;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-pct').textContent = pct+'%';
  document.getElementById('result-stats').innerHTML = `
    <div class="stat">✅ Aciertos<br>${correct}</div>
    <div class="stat">❌ Errores<br>${wrong}</div>
    <div class="stat">⏱️ Tiempo<br>${formatTime(elapsedMs)}</div>
    <div class="stat">🔥 Mejor racha<br>${maxStreak}</div>
    <div class="stat">⭐ Puntos<br>${correct*10}</div>
  `;
  document.getElementById('result-msg').textContent = msg;
  showScreen('screen-results');
  document.getElementById('topbar').classList.remove('show');
  if(pct>=60){ launchConfetti(80); playFanfare(); }
  else { playTone(300,0.3,'sine',0,0.15); }
  mascotSay(pct>=80 ? '¡Estoy muy orgulloso de ti! 🎉' : '¡Sigamos practicando juntos! 💪');
}
</script>
</body>
</html>
