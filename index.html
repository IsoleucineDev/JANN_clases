<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ángulos ∠</title>
<style>
  :root{
    --primary:#2D1B69;
    --primary-light:#4A2FA0;
    --secondary:#00B39B;
    --accent:#FFC93C;
    --accent-hot:#FF6B6B;
    --violet:#7C5CD6;
    --bg:#F4F2FB;
    --card:#FFFFFF;
    --text:#221845;
    --muted:#6C6480;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', Verdana, sans-serif;
    background:linear-gradient(160deg,var(--primary) 0%, #472B94 45%, var(--primary) 100%);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  .bg-bolt{
    position:fixed; font-size:2.5rem; opacity:.12; color:var(--accent);
    animation:float 9s ease-in-out infinite;
    pointer-events:none; z-index:0; user-select:none;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0) rotate(-6deg);}
    50%{ transform:translateY(-40px) rotate(6deg);}
  }

  .screen{
    position:relative; z-index:1; min-height:100vh;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:2rem 1rem;
  }
  .screen.active{display:flex;}

  /* ---------- START ---------- */
  #start .logo{
    font-size:5rem; animation:spark 2.2s ease-in-out infinite;
    filter:drop-shadow(0 0 20px rgba(255,201,60,.6));
  }
  @keyframes spark{
    0%,100%{ transform:scale(1) rotate(0deg);}
    50%{ transform:scale(1.12) rotate(-4deg);}
  }
  #start h1{ color:#fff; font-size:clamp(2.4rem, 6vw, 4rem); margin-top:.5rem; text-align:center; letter-spacing:1px;}
  #start p.tag{ color:#C9C2EE; font-style:italic; margin:.6rem 0 2.5rem; text-align:center; font-size:1.1rem;}
  .mode-row{ display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center;}
  .mode-btn{
    all:unset; cursor:pointer; background:var(--card); color:var(--primary);
    padding:1.6rem 2.4rem; border-radius:22px; font-size:1.3rem; font-weight:800;
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    box-shadow:0 10px 0 rgba(0,0,0,.18), 0 15px 25px rgba(0,0,0,.25);
    transition:transform .12s ease, box-shadow .12s ease; min-width:220px; text-align:center;
  }
  .mode-btn .emoji{font-size:2.4rem;}
  .mode-btn:hover{ transform:translateY(-4px); }
  .mode-btn:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.18), 0 6px 12px rgba(0,0,0,.2); }
  .mode-btn.practice{ background:var(--secondary); color:#fff; }
  .mode-btn small{ font-weight:500; font-size:.8rem; opacity:.75;}

  .back-btn{
    all:unset; cursor:pointer; position:fixed; top:1.2rem; left:1.2rem; z-index:5;
    background:rgba(255,255,255,.12); color:#fff; padding:.6rem 1.1rem; border-radius:14px;
    font-weight:700; font-size:.95rem; backdrop-filter:blur(4px); transition:background .15s;
  }
  .back-btn:hover{ background:rgba(255,255,255,.25); }

  /* ---------- CLASES SLIDESHOW ---------- */
  .clases-shell{ width:100%; max-width:760px; margin:0 auto; padding-top:1.5rem;}
  .slide-dots{ display:flex; justify-content:center; gap:.5rem; margin-bottom:1.2rem;}
  .slide-dots .dot{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.25); transition:all .25s;}
  .slide-dots .dot.active{ background:var(--accent); width:26px; border-radius:6px; }

  .slide-card{
    background:var(--card); border-radius:26px; padding:2.4rem 2rem; min-height:420px;
    box-shadow:0 20px 45px rgba(0,0,0,.3); animation:cardIn .35s ease;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(14px) scale(.97);} to{opacity:1; transform:none;} }
  .s-eyebrow{ color:var(--secondary); font-weight:800; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:.4rem;}
  .s-title{ color:var(--primary); font-size:clamp(1.6rem,4.5vw,2.2rem); font-weight:800; margin-bottom:.8rem;}
  .s-sub{ color:var(--muted); font-size:1.05rem; max-width:32rem; margin-bottom:1rem;}

  .slide-nav{ display:flex; justify-content:space-between; margin-top:1.4rem; gap:1rem; width:100%; max-width:760px;}
  .nav-btn{
    all:unset; cursor:pointer; padding:.8rem 1.4rem; border-radius:14px; font-weight:800;
    background:rgba(255,255,255,.12); color:#fff; transition:background .15s, transform .1s;
  }
  .nav-btn:hover{ background:rgba(255,255,255,.22); transform:translateY(-2px);}
  .nav-btn.primary{ background:var(--accent); color:var(--primary); }
  .nav-btn.disabled{ opacity:.35; pointer-events:none; }

  /* angle diagram (css conic-gradient wedge) */
  .angle-diagram{
    position:relative; width:180px; height:180px; margin:1rem auto 0;
  }
  .angle-diagram .wedge{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from -1turn, transparent 0deg, transparent calc(360deg - var(--deg)), var(--wedge-color) calc(360deg - var(--deg)), var(--wedge-color) 360deg);
  }
  .angle-diagram .ray{
    position:absolute; left:50%; top:50%; width:50%; height:3px; background:var(--primary);
    transform-origin:0 50%;
  }
  .angle-diagram .ray.base{ transform:rotate(0deg); }
  .angle-diagram .ray.top{ transform:rotate(calc(var(--deg) * -1deg)); }
  .angle-diagram .vertex{
    position:absolute; left:50%; top:50%; width:10px; height:10px; margin:-5px;
    background:var(--primary); border-radius:50%;
  }
  .angle-diagram .deg-label{
    position:absolute; left:50%; top:50%; font-weight:800; color:var(--primary); font-size:1.1rem;
    transform:translate(-50%,-50%) rotate(calc(var(--deg) * -0.5deg)) translate(38px) rotate(calc(var(--deg) * 0.5deg));
  }

  .def-row{ display:flex; align-items:center; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:.8rem; width:100%;}
  .def-item{ display:flex; align-items:center; gap:.6rem; background:#EDE9F9; padding:.7rem 1rem; border-radius:14px; font-size:.95rem;}
  .def-dot{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; color:#fff; flex-shrink:0;}

  .chip-row{ display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:.8rem;}
  .chip{ background:#EDE9F9; border-radius:16px; padding:1rem; min-width:8rem; text-align:center;}
  .chip-title{ font-size:1.3rem; font-weight:800; color:var(--primary); margin-bottom:.2rem;}
  .chip-sub{ font-size:.8rem; color:var(--muted); font-weight:600;}

  .type-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:.8rem; margin-top:.8rem; width:100%;}
  @media (max-width:600px){ .type-grid{ grid-template-columns:1fr 1fr; } }
  .type-card{ background:#EDE9F9; border-radius:16px; padding:1rem .6rem; text-align:center;}
  .type-card .angle-diagram{ width:90px; height:90px; }
  .type-name{ font-weight:800; color:var(--primary); font-size:1rem; margin-top:.5rem;}
  .type-desc{ font-size:.72rem; color:var(--muted); }

  /* ---------- QUIZ (shared by clase & practica) ---------- */
  .quiz-screen{ justify-content:flex-start; padding-top:5rem; width:100%; max-width:720px; margin:0 auto;}
  .quiz-header{ width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; gap:1rem; flex-wrap:wrap;}
  .progress-wrap{ flex:1; min-width:180px;}
  .progress-label{ color:#C9C2EE; font-size:.85rem; margin-bottom:.3rem; font-weight:700;}
  .progress-bar{ background:rgba(255,255,255,.15); height:10px; border-radius:6px; overflow:hidden;}
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--secondary),var(--accent)); width:0%; transition:width .4s ease;}

  .timer-ring{ position:relative; width:64px; height:64px; flex-shrink:0;}
  .timer-ring svg{ transform:rotate(-90deg); }
  .timer-ring circle{ fill:none; stroke-width:6; }
  .timer-ring .bg-c{ stroke:rgba(255,255,255,.15); }
  .timer-ring .fg-c{ stroke:var(--secondary); stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .3s; }
  .timer-num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:1.1rem;}

  .streak-chip{
    background:rgba(255,201,60,.15); color:var(--accent); font-weight:800; padding:.4rem .8rem;
    border-radius:12px; font-size:.85rem; display:flex; align-items:center; gap:.3rem; white-space:nowrap;
  }

  .quiz-card{
    background:var(--card); border-radius:24px; padding:2.2rem 1.8rem; width:100%;
    box-shadow:0 20px 45px rgba(0,0,0,.3); animation:cardIn .35s ease;
  }
  .q-eyebrow{ color:var(--secondary); font-weight:800; font-size:.8rem; letter-spacing:1.5px; text-transform:uppercase;}
  .q-text{ font-size:clamp(1.35rem, 4.4vw, 1.9rem); font-weight:800; color:var(--primary); margin:.6rem 0 1.8rem; text-align:center;}

  .options{ display:grid; grid-template-columns:1fr 1fr; gap:.9rem; }
  @media (max-width:480px){ .options{ grid-template-columns:1fr; } }
  .opt-btn{
    all:unset; cursor:pointer; text-align:center; background:#EDE9F9; color:var(--primary);
    font-weight:800; font-size:1.1rem; padding:1rem .5rem; border-radius:16px; border:3px solid transparent;
    transition:transform .1s ease, background .15s, border-color .15s;
  }
  .opt-btn:hover{ transform:translateY(-2px); background:#E1DAF7; }
  .opt-btn.correct{ background:var(--secondary); color:#fff; border-color:#00806f; }
  .opt-btn.wrong{ background:var(--accent-hot); color:#fff; border-color:#c23; }
  .opt-btn.disabled{ pointer-events:none; }
  .opt-btn.dim{ opacity:.45; }

  .feedback{ text-align:center; font-weight:800; margin-top:1.2rem; min-height:1.6rem; font-size:1.05rem;}
  .feedback.ok{ color:var(--secondary); }
  .feedback.bad{ color:var(--accent-hot); }

  /* ---------- RESULT ---------- */
  .result-screen .trophy{ font-size:5rem; animation:bounce 1.4s ease infinite; }
  @keyframes bounce{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-16px);} }
  .result-screen h2{ color:#fff; font-size:2.2rem; margin:.6rem 0; text-align:center;}
  .result-screen .score-big{ font-size:4rem; font-weight:900; color:var(--accent); text-align:center; }
  .result-screen .score-sub{ color:#C9C2EE; text-align:center; margin-bottom:2rem; }
  .result-btns{ display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
  .restart-btn{
    all:unset; cursor:pointer; background:var(--accent); color:var(--primary); padding:1rem 2.2rem;
    border-radius:16px; font-weight:800; font-size:1.1rem; box-shadow:0 8px 0 #cf9f20; transition:transform .12s;
  }
  .restart-btn:hover{ transform:translateY(-3px); }
  .restart-btn:active{ transform:translateY(3px); box-shadow:0 3px 0 #cf9f20;}
  .restart-btn.secondary{ background:rgba(255,255,255,.14); color:#fff; box-shadow:0 8px 0 rgba(0,0,0,.25);}

  .confetti{
    position:fixed; top:-20px; width:10px; height:16px; z-index:20; pointer-events:none; animation:fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:.9; } }
</style>
</head>
<body>

<div class="bg-bolt" style="top:8%; left:6%;">∠</div>
<div class="bg-bolt" style="top:70%; left:12%; animation-delay:-3s;">📐</div>
<div class="bg-bolt" style="top:20%; left:85%; animation-delay:-5s;">∠</div>
<div class="bg-bolt" style="top:80%; left:80%; animation-delay:-1.5s;">✦</div>
<div class="bg-bolt" style="top:45%; left:50%; animation-delay:-7s;">∠</div>

<!-- START -->
<section id="start" class="screen active">
  <div class="logo">∠</div>
  <h1>Ángulos</h1>
  <p class="tag">Elige a dónde quieres ir</p>
  <div class="mode-row">
    <button class="mode-btn class" onclick="startClases()">
      <span class="emoji">🎓</span>
      Clases
      <small>Tema + 20 ejercicios · 25s cada uno</small>
    </button>
    <button class="mode-btn practice" onclick="startQuiz('practice')">
      <span class="emoji">📐</span>
      Práctica
      <small>20 ejercicios · 25s cada uno</small>
    </button>
  </div>
</section>

<!-- CLASES: intro slideshow -->
<section id="clases" class="screen">
  <button class="back-btn" onclick="showScreen('start')">← Volver</button>
  <div class="clases-shell">
    <div class="slide-dots" id="slideDots"></div>
    <div class="slide-card" id="slideCard"></div>
    <div class="slide-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevSlide()">← Anterior</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextSlide()">Siguiente →</button>
    </div>
  </div>
</section>

<!-- QUIZ: shared markup for both class & practice -->
<section id="quiz" class="screen quiz-screen">
  <button class="back-btn" onclick="exitQuiz()">← Salir</button>
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">Pregunta 1 / 20</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="timer-ring">
      <svg width="64" height="64">
        <circle class="bg-c" cx="32" cy="32" r="26"></circle>
        <circle class="fg-c" id="timerCircle" cx="32" cy="32" r="26"></circle>
      </svg>
      <div class="timer-num" id="timerNum">25</div>
    </div>
    <div class="streak-chip">🔥 <span id="streakNum">0</span></div>
  </div>

  <div class="quiz-card">
    <div class="q-eyebrow" id="qDifficulty">Nivel fácil</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</section>

<!-- RESULT -->
<section id="result" class="screen result-screen">
  <div class="trophy" id="trophyEmoji">🏆</div>
  <h2 id="resultTitle">¡Bien hecho!</h2>
  <div class="score-big" id="scoreBig">0 / 20</div>
  <div class="score-sub" id="scoreSub"></div>
  <div class="result-btns" id="resultBtns"></div>
</section>

<script>
/* ============================================================
   CLASES: 4-slide intro
   ============================================================ */
const INTRO_SLIDES = [
  `<div class="s-eyebrow">Vamos a aprender esto</div>
   <h2 class="s-title">¿Qué son los ángulos?</h2>
   <p class="s-sub">Un ángulo se forma cuando dos rayos comparten el mismo punto de origen: el vértice.</p>
   <div class="angle-diagram" style="--deg:70; --wedge-color:#00B39B;">
     <div class="wedge"></div>
     <div class="ray base"></div>
     <div class="ray top"></div>
     <div class="vertex"></div>
     <div class="deg-label">70°</div>
   </div>`,

  `<div class="s-eyebrow">Concepto</div>
   <h2 class="s-title">Las partes de un ángulo</h2>
   <div class="angle-diagram" style="--deg:55; --wedge-color:#FFC93C;">
     <div class="wedge"></div>
     <div class="ray base"></div>
     <div class="ray top"></div>
     <div class="vertex"></div>
     <div class="deg-label">55°</div>
   </div>
   <div class="def-row">
     <div class="def-item"><span class="def-dot" style="background:#2D1B69;">●</span> <b>Vértice:</b>&nbsp;donde se unen los rayos</div>
     <div class="def-item"><span class="def-dot" style="background:#7C5CD6;">╱</span> <b>Lados:</b>&nbsp;los dos rayos</div>
     <div class="def-item"><span class="def-dot" style="background:#00B39B;">∠</span> <b>Abertura:</b>&nbsp;se mide en grados</div>
   </div>`,

  `<div class="s-eyebrow">Concepto</div>
   <h2 class="s-title">¿Cómo se miden?</h2>
   <p class="s-sub">Se miden en grados (°) con un transportador. Una vuelta completa mide 360°.</p>
   <div class="chip-row">
     <div class="chip"><div class="chip-title">90°</div><div class="chip-sub">un cuarto de vuelta</div></div>
     <div class="chip"><div class="chip-title">180°</div><div class="chip-sub">media vuelta</div></div>
     <div class="chip"><div class="chip-title">360°</div><div class="chip-sub">vuelta completa</div></div>
   </div>`,

  `<div class="s-eyebrow">Concepto</div>
   <h2 class="s-title">Tipos de ángulos</h2>
   <div class="type-grid">
     <div class="type-card">
       <div class="angle-diagram" style="--deg:50; --wedge-color:#00B39B;"><div class="wedge"></div><div class="ray base"></div><div class="ray top"></div><div class="vertex"></div></div>
       <div class="type-name">Agudo</div><div class="type-desc">&lt; 90°</div>
     </div>
     <div class="type-card">
       <div class="angle-diagram" style="--deg:90; --wedge-color:#FFC93C;"><div class="wedge"></div><div class="ray base"></div><div class="ray top"></div><div class="vertex"></div></div>
       <div class="type-name">Recto</div><div class="type-desc">= 90°</div>
     </div>
     <div class="type-card">
       <div class="angle-diagram" style="--deg:130; --wedge-color:#7C5CD6;"><div class="wedge"></div><div class="ray base"></div><div class="ray top"></div><div class="vertex"></div></div>
       <div class="type-name">Obtuso</div><div class="type-desc">90°&ndash;180°</div>
     </div>
     <div class="type-card">
       <div class="angle-diagram" style="--deg:180; --wedge-color:#FF6B6B;"><div class="wedge"></div><div class="ray base"></div><div class="ray top"></div><div class="vertex"></div></div>
       <div class="type-name">Llano</div><div class="type-desc">= 180°</div>
     </div>
   </div>`,
];

let slideIndex = 0;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startClases(){
  slideIndex = 0;
  showScreen('clases');
  renderSlide();
}

function renderSlide(){
  document.getElementById('slideCard').innerHTML = INTRO_SLIDES[slideIndex];
  const dotsWrap = document.getElementById('slideDots');
  dotsWrap.innerHTML = INTRO_SLIDES.map((_, i) =>
    `<div class="dot ${i === slideIndex ? 'active' : ''}"></div>`).join('');
  document.getElementById('prevBtn').classList.toggle('disabled', slideIndex === 0);
  document.getElementById('nextBtn').textContent =
    slideIndex === INTRO_SLIDES.length - 1 ? 'Empezar ejercicios de clase →' : 'Siguiente →';
}

function prevSlide(){
  if(slideIndex > 0){ slideIndex--; renderSlide(); }
}
function nextSlide(){
  if(slideIndex < INTRO_SLIDES.length - 1){ slideIndex++; renderSlide(); }
  else { startQuiz('class'); }
}

/* ============================================================
   QUESTION BANKS — 20 for class (guided, timed) + 20 for practice
   ============================================================ */
const CLASS_QUESTIONS = [
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 30°?", options:["Agudo","Recto","Obtuso","Llano"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 90°?", options:["Recto","Agudo","Obtuso","Llano"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 120°?", options:["Obtuso","Agudo","Recto","Llano"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 180°?", options:["Llano","Recto","Obtuso","Agudo"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 15°?", options:["Agudo","Obtuso","Recto","Llano"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 175°?", options:["Obtuso","Llano","Agudo","Recto"], correct:0 },
  { level:"Nivel medio", text:"¿Cuál es el complemento de 40°?", options:["50°","60°","140°","40°"], correct:0 },
  { level:"Nivel medio", text:"¿Cuál es el complemento de 10°?", options:["80°","70°","170°","10°"], correct:0 },
  { level:"Nivel medio", text:"¿Cuál es el suplemento de 100°?", options:["80°","100°","20°","260°"], correct:0 },
  { level:"Nivel medio", text:"¿Cuál es el suplemento de 45°?", options:["135°","45°","55°","225°"], correct:0 },
  { level:"Nivel medio", text:"¿Qué tipo de ángulo es 60°?", options:["Agudo","Recto","Obtuso","Llano"], correct:0 },
  { level:"Nivel medio", text:"¿Qué tipo de ángulo es 91°?", options:["Obtuso","Agudo","Recto","Llano"], correct:0 },
  { level:"Nivel medio", text:"¿Cuál es el complemento de 25°?", options:["65°","75°","155°","25°"], correct:0 },
  { level:"Nivel medio", text:"¿Cuál es el suplemento de 170°?", options:["10°","190°","80°","170°"], correct:0 },
  { level:"Nivel difícil", text:"¿Cuál es el suplemento de 90°?", options:["90°","180°","45°","0°"], correct:0 },
  { level:"Nivel difícil", text:"¿Cuál es el complemento de 89°?", options:["1°","11°","91°","179°"], correct:0 },
  { level:"Nivel difícil", text:"Dos ángulos suman 180° y uno mide 130°. ¿Cuánto mide el otro?", options:["50°","60°","40°","130°"], correct:0 },
  { level:"Nivel difícil", text:"Dos ángulos suman 90° y uno mide 63°. ¿Cuánto mide el otro?", options:["27°","37°","17°","63°"], correct:0 },
  { level:"Nivel difícil", text:"Un ángulo recto se divide en dos partes iguales. ¿Cuánto mide cada una?", options:["45°","90°","30°","60°"], correct:0 },
  { level:"Reto final", text:"Un ángulo llano se divide en tres ángulos iguales. ¿Cuánto mide cada uno?", options:["60°","90°","45°","120°"], correct:0 },
];

const PRACTICE_QUESTIONS = [
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 45°?", options:["Agudo","Recto","Obtuso","Llano"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 90°?", options:["Recto","Agudo","Obtuso","Llano"], correct:0 },
  { level:"Nivel fácil", text:"¿Qué tipo de ángulo es 100°?", options:["Obtuso","Agudo","Recto","Llano"], correct:0 },

/* ============================================================
   QUIZ ENGINE (shared)
   ============================================================ */
let quizMode = 'class';
let current = 0, score = 0, streak = 0, timer = null, timeLeft = 25;
const TOTAL_TIME = 25;
const RADIUS = 26, CIRC = 2 * Math.PI * RADIUS;

function activeQuestions(){ return quizMode === 'class' ? CLASS_QUESTIONS : PRACTICE_QUESTIONS; }

function startQuiz(mode){
  quizMode = mode;
  current = 0; score = 0; streak = 0;
  document.getElementById('streakNum').textContent = '0';
  showScreen('quiz');
  loadQuestion();
}

function exitQuiz(){
  clearInterval(timer);
  showScreen('start');
}

function loadQuestion(){
  clearInterval(timer);
  const qs = activeQuestions();
  const q = qs[current];
  document.getElementById('qDifficulty').textContent = q.level;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressLabel').textContent = `Pregunta ${current+1} / ${qs.length}`;
  document.getElementById('progressFill').style.width = `${(current/qs.length)*100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  timeLeft = TOTAL_TIME;
  updateTimerDisplay();
  timer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0){ clearInterval(timer); selectAnswer(-1); }
  }, 1000);
}

function updateTimerDisplay(){
  const circle = document.getElementById('timerCircle');
  const offset = CIRC * (1 - timeLeft / TOTAL_TIME);
  circle.style.strokeDasharray = CIRC;
  circle.style.strokeDashoffset = offset;
  document.getElementById('timerNum').textContent = timeLeft;
  circle.style.stroke = timeLeft > 10 ? '#00B39B' : (timeLeft > 5 ? '#FFC93C' : '#FF6B6B');
}

function selectAnswer(idx){
  clearInterval(timer);
  const qs = activeQuestions();
  const q = qs[current];
  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach((b, i) => {
    b.classList.add('disabled');
    if(i === q.correct) b.classList.add('correct');
    if(i === idx && idx !== q.correct) b.classList.add('wrong');
    if(i !== q.correct && i !== idx) b.classList.add('dim');
  });

  const fb = document.getElementById('feedback');
  if(idx === q.correct){
    score++; streak++;
    document.getElementById('streakNum').textContent = streak;
    fb.textContent = '¡Correcto! 🎉';
    fb.className = 'feedback ok';
    burstConfetti();
  } else if(idx === -1){
    streak = 0;
    document.getElementById('streakNum').textContent = streak;
    fb.textContent = '⏰ ¡Se acabó el tiempo!';
    fb.className = 'feedback bad';
  } else {
    streak = 0;
    document.getElementById('streakNum').textContent = streak;
    fb.textContent = 'Casi... ¡sigue intentando!';
    fb.className = 'feedback bad';
  }

  setTimeout(() => {
    current++;
    if(current < qs.length){ loadQuestion(); }
    else { finishQuiz(); }
  }, 1400);
}

function finishQuiz(){
  document.getElementById('progressFill').style.width = '100%';
  showScreen('result');
  const qs = activeQuestions();
  const pct = Math.round((score / qs.length) * 100);
  document.getElementById('scoreBig').textContent = `${score} / ${qs.length}`;
  let title, sub, trophy;
  if(pct >= 90){ title = '¡Eres un experto en ángulos!'; trophy='🏆'; sub='Dominas la clasificación y las reglas por completo.'; }
  else if(pct >= 70){ title = '¡Muy bien hecho!'; trophy='🥈'; sub='Ya casi dominas los ángulos por completo.'; }
  else if(pct >= 50){ title = '¡Buen intento!'; trophy='🥉'; sub='Vas por buen camino, repasa un poco más.'; }
  else { title = '¡Sigue practicando!'; trophy='💪'; sub='Revisa la clase y vuelve a intentarlo.'; }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('scoreSub').textContent = sub;
  document.getElementById('trophyEmoji').textContent = trophy;
  if(pct >= 70) burstConfetti(30);

  const btnsWrap = document.getElementById('resultBtns');
  if(quizMode === 'class'){
    btnsWrap.innerHTML = `
      <button class="restart-btn" onclick="startQuiz('class')">Repetir clase</button>
      <button class="restart-btn secondary" onclick="startQuiz('practice')">Ir a práctica 📐</button>`;
  } else {
    btnsWrap.innerHTML = `
      <button class="restart-btn" onclick="startQuiz('practice')">Volver a intentar</button>
      <button class="restart-btn secondary" onclick="showScreen('start')">Volver al inicio</button>`;
  }
}

function burstConfetti(n){
  const colors = ['#FFC93C','#00B39B','#FF6B6B','#fff','#7C5CD6'];
  const count = n || 14;
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.6 + Math.random()*1.2) + 's';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3200);
  }
}
